          ${all.map(item=>{
            const u = item.thumbnailBlob ? URL.createObjectURL(item.thumbnailBlob) : '';
            const on = sel.has(item.id);
            return `<div id="psel-${item.id}" class="f5a-card" style="cursor:pointer;${on?'outline:3px solid var(--sf-primary)':''}"
              onclick="_togglePSel('${item.id}')">
              ${u?`<img class="f5a-thumb" src="${u}" style="height:80px" onload="URL.revokeObjectURL(this.src)">`
                 :`<div class="f5a-thumb-empty" style="height:80px">—</div>`}
              <div style="padding:4px 8px;font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.title}</div>
              <div id="psel-chk-${item.id}" style="text-align:center;color:var(--sf-primary);height:18px">${on?'✓':''}</div>
            </div>`;}).join('')}
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button class="sf-btn sf-btn--primary" onclick="_confirmPSel()">Confirmă selecția</button>
          <button class="sf-btn sf-btn--secondary" onclick="closeModal()">Anulează</button>
        </div>`, {wide:true});
    }

    function _togglePSel(id) {
      const sel  = new Set(AppState._editingPortfolioIds||[]);
      const card = document.getElementById(`psel-${id}`);
      const chk  = document.getElementById(`psel-chk-${id}`);
      if (sel.has(id)) {
        sel.delete(id);
        if (card) card.style.outline = '';
        if (chk)  chk.textContent = '';
      } else {
        if (sel.size >= 5) { showToast('warning','Maxim 5 imagini selectate.'); return; }
        sel.add(id);
        if (card) card.style.outline = '3px solid var(--sf-primary)';
        if (chk)  chk.textContent = '✓';
      }
      AppState._editingPortfolioIds = [...sel];
    }

    function _confirmPSel() {
      closeModal();
      const n = AppState._editingPortfolioIds.length;
      const btn = document.getElementById('f5-port-btn');
      const inf = document.getElementById('f5-port-info');
      if (btn) btn.textContent = `Selectează imagini (${n}/5)`;
      if (inf) inf.textContent = n ? `${n} imagini selectate` : 'Nicio imagine selectată';
    }

  <script id="sf-f7">
    // ── sf-f7: Intelligence Dashboard ─────────────────────────
    async function renderIntelligence() {

        const s = document.createElement('style'); s.id='sf-f7-css';

      AppState._f7data = {leads, offers, closed, pending};

      el.innerHTML = `<div style="padding:20px 24px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <h1 style="font-size:20px;font-weight:700;color:var(--sf-primary)">Intelligence</h1>

        </div>
        ${debCnt>=20&&debCnt<50?`<div style="background:#FFF8E1;border:1px solid #F9A825;border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:13px"><strong>💡 ${debCnt} debriefuri completate!</strong> Poți calibra ponderile Win Probability în Setări → Scoring.</div>`:''}
        ${!closed.length?`<div class="sf-card" style="padding:40px;text-align:center;color:var(--sf-text-3)">Date insuficiente. Adaugă leads și completează debriefuri pentru a vedea statistici.</div>`:`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="sf-card f7-panel">
            <div class="f7-panel-hd"><span>Funnel leads pe stagiu</span><button onclick="_f7CsvFunnel()" class="f7-csv-btn">CSV</button></div>
            <canvas id="c-funnel" width="420" height="180" style="max-width:100%"></canvas>
          </div>
          <div class="sf-card f7-panel">
            <div class="f7-panel-hd"><span>Win rate per sursă</span><button onclick="_f7CsvSource()" class="f7-csv-btn">CSV</button></div>
            <canvas id="c-source" width="420" height="180" style="max-width:100%"></canvas>
          </div>
          <div class="sf-card f7-panel">
            <div class="f7-panel-hd"><span>Win rate per tipologie (ARH vs INT)</span><button onclick="_f7CsvTypo()" class="f7-csv-btn">CSV</button></div>
            <div id="c-typo"></div>
          </div>

            <canvas id="c-monthly" width="420" height="180" style="max-width:100%"></canvas>
          </div>
          <div class="sf-card f7-panel">
            <div class="f7-panel-hd"><span>Ciclu mediu deal (zile)</span><button onclick="_f7CsvCycle()" class="f7-csv-btn">CSV</button></div>
            <canvas id="c-cycle" width="420" height="180" style="max-width:100%"></canvas>
          </div>
          <div class="sf-card f7-panel">

      if (closed.length) requestAnimationFrame(()=>{
        _f7DrawFunnel(document.getElementById('c-funnel'), leads);

        _f7DrawMonthly(document.getElementById('c-monthly'), leads, offers);
        _f7DrawCycle(document.getElementById('c-cycle'), closed);
        _f7DrawScoring(document.getElementById('c-scoring'), leads);
      });
    }

    // ── Canvas helpers ────────────────────────────────────────
    const _f7C={primary:'#1C3557',accent:'#C9963A',disc:'#4A90D9',design:'#E67E22',hot:'#E74C3C',cold:'#95A5A6'};
    function _f7Rect(ctx,x,y,w,h,color){if(w<=0||h<=0)return;ctx.fillStyle=color;ctx.fillRect(x,y,w,h);}
    function _f7Txt(ctx,text,x,y,{color='#555',size=10,align='left',bold=false}={}){
      ctx.fillStyle=color;ctx.font=`${bold?'bold ':' '}${size}px "Segoe UI",Arial,sans-serif`;ctx.textAlign=align;ctx.fillText(String(text),x,y);
    }

    // ── Panel 1: Funnel (grouped bar) ─────────────────────────
    function _f7DrawFunnel(canvas,leads){
      if(!canvas)return;
      const stages=['brief_primit','propunere_trimisa','negociere','contractat','pierdut'];
      const labels=['Brief','Propunere','Negociere','Contractat','Pierdut'];
      const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
      ctx.clearRect(0,0,W,H);
      const dD=stages.map(s=>leads.filter(l=>l.funnelType==='discovery'&&l.pipelineStage===s).length);
      const dG=stages.map(s=>leads.filter(l=>l.funnelType==='design'&&l.pipelineStage===s).length);
      const maxV=Math.max(...dD.map((v,i)=>v+dG[i]),1);
      const pad={t:20,r:10,b:28,l:20};
      const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
      const bw=cw/stages.length,gp=4,bW=bw-gp*2;
      stages.forEach((s,i)=>{
        const x=pad.l+i*bw+gp;
        const dH=(dD[i]/maxV)*ch,gH=(dG[i]/maxV)*ch;
        _f7Rect(ctx,x,pad.t+(ch-dH),bW/2-1,dH,_f7C.disc);
        _f7Rect(ctx,x+bW/2+1,pad.t+(ch-gH),bW/2-1,gH,_f7C.design);
        _f7Txt(ctx,labels[i],x+bW/2,H-8,{align:'center',size:9});
        const tot=dD[i]+dG[i];
        if(tot>0)_f7Txt(ctx,tot,x+bW/2,pad.t+(ch-Math.max(dH,gH))-3,{align:'center',bold:true,color:'#333'});
      });
      ctx.fillStyle=_f7C.disc;ctx.fillRect(pad.l,6,10,8);_f7Txt(ctx,'Discovery',pad.l+14,14,{size:9,color:'#666'});
      ctx.fillStyle=_f7C.design;ctx.fillRect(pad.l+80,6,10,8);_f7Txt(ctx,'Design',pad.l+94,14,{size:9,color:'#666'});
    }

    // ── Panel 2: Source win rate (horizontal bar) ─────────────
    function _f7DrawSource(canvas,closed){
      if(!canvas)return;
      const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
      ctx.clearRect(0,0,W,H);
      const LABELS={referral:'Referral',architect_net:'Rețea arhitecți',online_ad:'Online/Ad',walk_in:'Walk-in',other:'Alte surse'};
      const sources={};
      closed.forEach(l=>{const s=l.sourceType||'other';if(!sources[s])sources[s]={won:0,n:0};sources[s].n++;if(l.status==='won')sources[s].won++;});
      const items=Object.entries(sources).map(([k,v])=>({label:LABELS[k]||k,rate:v.n?Math.round(v.won/v.n*100):0,n:v.n})).sort((a,b)=>b.rate-a.rate);
      if(!items.length){_f7Txt(ctx,'Insuficiente date',W/2,H/2,{align:'center',color:'#aaa',size:13});return;}
      const pad={t:8,r:70,b:8,l:120};
      const rh=Math.min(26,(H-pad.t-pad.b)/items.length-5),bw=W-pad.l-pad.r;
      items.forEach((it,i)=>{
        const y=pad.t+i*(rh+6);
        _f7Txt(ctx,it.label,pad.l-6,y+rh/2+4,{align:'right',size:10});
        ctx.fillStyle='#eee';ctx.fillRect(pad.l,y,bw,rh);
        _f7Rect(ctx,pad.l,y,(it.rate/100)*bw,rh,_f7C.accent);
        _f7Txt(ctx,`${it.rate}% (n=${it.n})`,pad.l+bw+6,y+rh/2+4,{size:10});
      });
    }

    // ── Panel 3: Typology heatmap (HTML table) ────────────────
    function _f7DrawTypo(container,closed){
      if(!container)return;
      const TYPOS=['T1','T2','T3','T4','T5','T6'];
      const cell=(t,f)=>{const r=closed.filter(l=>l.typology===t&&l.funnelType===f);const w=r.filter(l=>l.status==='won').length;return{rate:r.length?Math.round(w/r.length*100):null,n:r.length};};
      const clr=r=>r===null?'#f5f5f3':r>=60?'#d4edda':r>=35?'#fff3cd':'#f8d7da';
      container.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:4px">

    // ── Panel 4: Monthly dual-axis line ───────────────────────
    function _f7DrawMonthly(canvas,leads,offers){
      if(!canvas)return;
      const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
      ctx.clearRect(0,0,W,H);
      const months=[];
      for(let i=5;i>=0;i--){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);months.push({key:d.toISOString().slice(0,7),label:d.toLocaleDateString('ro-RO',{month:'short'})});}
      const spm=months.map(m=>offers.filter(o=>o.sentAt&&o.sentAt.slice(0,7)===m.key).length);
      const vpm=months.map(m=>leads.filter(l=>l.status==='won'&&(l.stageEnteredAt||'').slice(0,7)===m.key).reduce((s,l)=>s+(l.wonContractValue||0),0));
      const maxS=Math.max(...spm,1),maxV=Math.max(...vpm,1);
      const pad={t:20,r:55,b:22,l:28};
      const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
      const step=cw/(months.length-1||1);
      ctx.strokeStyle='#eee';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t+ch/2);ctx.lineTo(pad.l+cw,pad.t+ch/2);ctx.stroke();
      const drawLine=(data,maxD,color)=>{
        ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;
        data.forEach((v,i)=>{const x=pad.l+i*step,y=pad.t+ch-(v/maxD)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
        ctx.fillStyle=color;data.forEach((v,i)=>{ctx.beginPath();ctx.arc(pad.l+i*step,pad.t+ch-(v/maxD)*ch,3,0,Math.PI*2);ctx.fill();});
      };
      drawLine(spm,maxS,_f7C.disc);drawLine(vpm,maxV,_f7C.accent);
      months.forEach((m,i)=>_f7Txt(ctx,m.label,pad.l+i*step,H-6,{align:'center',size:9}));
      _f7Txt(ctx,maxS,pad.l-4,pad.t+12,{align:'right',size:9,color:_f7C.disc});
      _f7Txt(ctx,(maxV/1000).toFixed(0)+'k€',W-2,pad.t+12,{align:'right',size:9,color:_f7C.accent});
      ctx.fillStyle=_f7C.disc;ctx.fillRect(pad.l,6,20,3);_f7Txt(ctx,'Oferte trimise',pad.l+24,12,{size:9,color:'#666'});
      ctx.fillStyle=_f7C.accent;ctx.fillRect(pad.l+120,6,20,3);_f7Txt(ctx,'Val. contractată',pad.l+144,12,{size:9,color:'#666'});
    }

    // ── Panel 5: Deal cycle (horizontal bar) ─────────────────
    function _f7DrawCycle(canvas,closed){
      if(!canvas)return;
      const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
      ctx.clearRect(0,0,W,H);
      const won=closed.filter(l=>l.status==='won'&&l.stageEnteredAt&&l.createdAt);
      const avg=arr=>arr.length?Math.round(arr.reduce((s,l)=>s+Math.max(0,daysDiff(l.createdAt,l.stageEnteredAt)),0)/arr.length):null;
      const items=[{label:'Discovery',val:avg(won.filter(l=>l.funnelType==='discovery')),n:won.filter(l=>l.funnelType==='discovery').length,color:_f7C.disc},{label:'Design',val:avg(won.filter(l=>l.funnelType==='design')),n:won.filter(l=>l.funnelType==='design').length,color:_f7C.design}].filter(it=>it.val!==null);
      if(!items.length){_f7Txt(ctx,'Insuficiente date',W/2,H/2,{align:'center',color:'#aaa',size:13});return;}
      const maxV=Math.max(...items.map(it=>it.val),1);
      const pad={t:30,r:20,b:20,l:100};
      const rh=36,gap=20,bw=W-pad.l-pad.r;
      items.forEach((it,i)=>{
        const y=pad.t+i*(rh+gap);
        _f7Txt(ctx,it.label,pad.l-6,y+rh/2+5,{align:'right',size:12,color:'#444'});
        ctx.fillStyle='#eee';ctx.fillRect(pad.l,y,bw,rh);
        _f7Rect(ctx,pad.l,y,(it.val/maxV)*bw,rh,it.color);
        _f7Txt(ctx,`${it.val} zile (n=${it.n})`,pad.l+(it.val/maxV)*bw+8,y+rh/2+5,{size:11,color:'#333',bold:true});
      });
    }

    // ── Panel 6: Scoring accuracy (horizontal bars) ───────────
    function _f7DrawScoring(canvas,leads){
      if(!canvas)return;
      const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
      ctx.clearRect(0,0,W,H);
      const closed=leads.filter(l=>['won','lost'].includes(l.status));
      const pct=arr=>arr.length?Math.round(arr.filter(l=>l.status==='won').length/arr.length*100):null;
      const items=[
        {label:'HOT ≥105',arr:closed.filter(l=>(l.scoreTotal||0)>=105),color:_f7C.hot},
        {label:'WARM 70–104',arr:closed.filter(l=>(l.scoreTotal||0)>=70&&(l.scoreTotal||0)<105),color:_f7C.accent},
        {label:'COLD <70',arr:closed.filter(l=>(l.scoreTotal||0)<70),color:_f7C.cold}
      ];
      const pad={t:16,r:20,b:16,l:110};
      const rh=30,gap=12,bw=W-pad.l-pad.r-80;
      const totalH=items.length*(rh+gap)-gap;
      const startY=(H-totalH)/2+pad.t-16;
      items.forEach((it,i)=>{
        const y=startY+i*(rh+gap),rate=pct(it.arr);
        _f7Txt(ctx,it.label,pad.l-6,y+rh/2+5,{align:'right',size:11,color:'#444'});
        ctx.fillStyle='#eee';ctx.fillRect(pad.l,y,bw,rh);
        if(rate!==null){_f7Rect(ctx,pad.l,y,(rate/100)*bw,rh,it.color);_f7Txt(ctx,`${rate}% (n=${it.arr.length})`,pad.l+bw+8,y+rh/2+5,{size:10});}
        else _f7Txt(ctx,`— (n=${it.arr.length})`,pad.l+bw+8,y+rh/2+5,{size:10,color:'#aaa'});
      });
    }

    async function _f7SaveDebrief(leadId){
      const scoreOk=document.querySelector('input[name="db-score"]:checked')?.value==='true';
      const priceVal=document.querySelector('input[name="db-price"]:checked')?.value;
      const priceDir=document.getElementById('db-price-dir')?.value||null;
      const worked=document.getElementById('db-worked')?.value?.trim()||'';
      const failed=document.getElementById('db-failed')?.value?.trim()||'';
      const lead=await AppState.db.get('leads',leadId);
      if(!lead){closeModal();return;}
      if(lead.status==='lost'&&!failed){showToast('warning','Completează câmpul "Ce a eșuat?".');return;}
      await AppState.db.put('leads',{...lead,debrief:{completed:true,scoringAccurate:scoreOk,priceAccurate:priceVal==='true',priceDirection:priceVal==='false'?priceDir:null,whatWorked:worked,whatFailed:failed,completedAt:new Date().toISOString()},updatedAt:new Date().toISOString()});

    <hr style="border:none;border-top:1px solid var(--sf-border);margin:14px 0">
    <div style="font-size:13px;font-weight:600;color:#C0392B;margin-bottom:8px">Zona periculoasă</div>
    <button class="sf-btn" style="border-color:#C0392B;color:#C0392B" onclick="_s10DeleteAll()">Ștergere completă date</button>
  </div>

  <div class="sf-card s10-sec">
    <div class="s10-sh">10.5 Rate Card</div>
    ${rateCards.map(rc=>`<div class="s10-rc-row"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><strong style="font-size:13px">${_esc(rc.name)}</strong>${rc.isDefault?`<span style="font-size:10px;background:var(--sf-primary);color:#fff;padding:2px 8px;border-radius:10px">Default</span>`:`<button class="sf-btn s10-sm-btn" onclick="_s10SetDefaultRC('${rc.id}')">Default</button><button class="sf-btn s10-sm-btn" style="color:#C0392B" onclick="_s10DeleteRC('${rc.id}')">Șterge</button>`}</div><label style="font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px">EUR/h<input class="sf-input" style="width:80px" type="number" min="1" value="${rc.hourlyRateEUR}" onchange="_s10SaveRC('${rc.id}',this.value)"></label></div>`).join('')}
    ${rateCards.length<3?`<button class="sf-btn s10-sm-btn" onclick="_s10AddRC()" style="margin-top:8px">+ Adaugă rate card</button>`:''}
  </div>

  <div class="sf-card s10-sec">
    <div class="s10-sh">10.6 Price Intelligence</div>
    <div style="font-size:13px;margin-bottom:12px"><strong>${closedN}</strong> deal-uri completate. Price Intelligence: <strong style="color:${closedN>=piMin?'#27ae60':'var(--sf-text-3)'}">${closedN>=piMin?'ACTIV':'INSUFICIENT'}</strong> (prag: ${piMin})</div>
    <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px">Minimum samples pentru activare</label>
    <input id="s10-pimin" class="sf-input" type="number" min="5" max="200" value="${piMin}" style="width:100px">
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="sf-btn sf-btn--primary" onclick="_s10SavePI()">Salvează</button>
      <button class="sf-btn s10-sm-btn" onclick="_s10ResetWP()">Reset ponderi Win Probability</button>
    </div>
  </div>

  <div class="sf-card s10-sec" style="margin-bottom:40px">
    <div class="s10-sh">10.7 Sistem</div>
    <div style="font-size:12px;color:var(--sf-text-3);line-height:2"><div>Versiune app: <strong>${APP_VERSION}</strong></div><div>Schema IndexedDB: <strong>v${st.schemaVersion||1}</strong></div></div>
    <button class="sf-btn s10-sm-btn" style="margin-top:10px" onclick="_s10ForceSwUpdate()">Forțează update Service Worker</button>
  </div>
  </div>`;
      _s10ScorePreview();
    }

    function _s10ScorePreview(){
      const hot=parseInt(document.getElementById('s10-hot')?.value)||105;
      const warm=parseInt(document.getElementById('s10-warm')?.value)||70;
      const prev=document.getElementById('s10-score-prev');if(!prev)return;
      const cat=v=>v>=hot?'<strong style="color:var(--sf-hot)">HOT</strong>':v>=warm?'<strong style="color:var(--sf-accent)">WARM</strong>':'<strong style="color:var(--sf-cold)">COLD</strong>';
      prev.innerHTML=`Preview: 120 → ${cat(120)} · 80 → ${cat(80)} · 50 → ${cat(50)}`;
    }

    function _s10WpSync(){
      const ids=['s10-ws','s10-wsrc','s10-wt','s10-wp'];
      let total=0;
      ids.forEach(id=>{const v=parseInt(document.getElementById(id)?.value||0);total+=v;const vEl=document.getElementById(id+'-v');if(vEl)vEl.textContent=v+'%';});
      const el=document.getElementById('s10-wsum');if(el){el.textContent=`(sumă: ${total}%)`;el.style.color=total===100?'var(--sf-text-3)':'#C0392B';}
    }

    async function _s10SaveStudio(){
      const studio=await AppState.db.get('studio',1)||{id:1};
      let logoBlob=studio.logoBlob||null;
      const file=document.getElementById('s10-logo')?.files[0];
      if(file)try{logoBlob=await compressImage(file,200,800);}catch{}
      const updated={...studio,
        name:document.getElementById('s10-sname')?.value?.trim()||studio.name,
        vatId:document.getElementById('s10-cui')?.value?.trim()||studio.vatId,
        address:document.getElementById('s10-addr')?.value?.trim()||studio.address,
        phone:document.getElementById('s10-phone')?.value?.trim()||studio.phone,
        email:document.getElementById('s10-email')?.value?.trim()||studio.email,
        website:document.getElementById('s10-web')?.value?.trim()||studio.website,
        hourlyRateEUR:parseFloat(document.getElementById('s10-rate')?.value)||studio.hourlyRateEUR,
        weeklyCapacityHours:parseInt(document.getElementById('s10-cap')?.value)||studio.weeklyCapacityHours,
        activeProjectsLimit:parseInt(document.getElementById('s10-mxp')?.value)||studio.activeProjectsLimit,
        logoBlob, updatedAt:new Date().toISOString()
      };
      await AppState.db.put('studio',updated);
      renderSidebarLogo(updated.logoBlob);renderSidebarStudioName(updated.name);
      showToast('success','Studio salvat.');renderSettings();
    }

    async function _s10RemoveLogo(){
      const studio=await AppState.db.get('studio',1);if(!studio)return;
      await AppState.db.put('studio',{...studio,logoBlob:null,updatedAt:new Date().toISOString()});
      renderSidebarLogo(null);showToast('success','Logo șters.');renderSettings();
    }

    async function _s10SaveScoring(){
      const ids=['s10-ws','s10-wsrc','s10-wt','s10-wp'];
      const vals=ids.map(id=>parseInt(document.getElementById(id)?.value)||0);
      if(vals.reduce((s,v)=>s+v,0)!==100){showToast('warning','Ponderile trebuie să sumeze 100%. Ajustează înainte de salvare.');return;}
      const st=await AppState.db.get('settings','settings')||{id:'settings'};
      await AppState.db.put('settings',{...st,
        scoreThresholds:{hot:parseInt(document.getElementById('s10-hot')?.value)||105,warm:parseInt(document.getElementById('s10-warm')?.value)||70},
        goNoGoRules:{...st.goNoGoRules,minScore:parseInt(document.getElementById('s10-ming')?.value)||70,maxActiveProjects:parseInt(document.getElementById('s10-mxpa')?.value)||8},
        winProbWeights:{scoreWeight:vals[0]/100,sourceWeight:vals[1]/100,typologyWeight:vals[2]/100,pricePositionWeight:vals[3]/100},
        updatedAt:new Date().toISOString()
      });
      showToast('success','Scoring & ponderi salvate.');
    }

    async function _s10SaveCadence(){
      const raw=document.getElementById('s10-cdays')?.value||'';
      const days=raw.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>=0).sort((a,b)=>a-b);
      if(!days.length){showToast('warning','Introdu cel puțin o zi de cadență.');return;}
      const st=await AppState.db.get('settings','settings')||{id:'settings'};
      await AppState.db.put('settings',{...st,cadenceDays:days,updatedAt:new Date().toISOString()});
      showToast('success',`Cadence: ${days.join(', ')} zile.`);
    }

    async function _s10ResetCadence(){document.getElementById('s10-cdays').value='0, 3, 7, 14, 30';await _s10SaveCadence();}

    function base64ToBlob(dataUrl,mime='image/jpeg'){
      if(!dataUrl)return null;
      try{const[,b64]=dataUrl.split(',');const raw=atob(b64);const u8=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)u8[i]=raw.charCodeAt(i);return new Blob([u8],{type:mime});}catch{return null;}
    }

    async function clearAllData(db){
      await Promise.all([
        db.delete('studio',1),
        db.delete('settings','settings'),
        ...['clients','leads','offers','activities','portfolio','rateCards'].map(s=>
          db.getAll(s).then(all=>Promise.all(all.map(r=>db.delete(s,r.id))))
        )
      ]);
    }

    function _s10ImportBackup(){
      const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
      inp.onchange=async()=>{
        const file=inp.files[0];if(!file)return;
        let backup;
        try{backup=JSON.parse(await file.text());}catch{showToast('error','Fișier invalid — nu este JSON valid.');return;}
        if(!backup._meta?.version){showToast('error','Fișier incompatibil.');return;}
        const ok=await showConfirmDialog({title:'Restaurare date',message:`Toate datele curente vor fi înlocuite cu backup-ul din ${backup._meta.exportedAt||'?'}. Continui?`,confirmText:'RESTAUREAZĂ',dangerKeyword:'RESTAUREAZĂ'});
        if(!ok)return;
        try{
          await clearAllData(AppState.db);
          if(backup.studio)await AppState.db.put('studio',backup.studio);
          await Promise.all([
            backup.clients?.length&&AppState.db.putBulk('clients',backup.clients),
            backup.leads?.length&&AppState.db.putBulk('leads',backup.leads),
            backup.offers?.length&&AppState.db.putBulk('offers',backup.offers),
            backup.activities?.length&&AppState.db.putBulk('activities',backup.activities),
            backup.rateCards?.length&&AppState.db.putBulk('rateCards',backup.rateCards),
            backup.portfolio?.length&&AppState.db.putBulk('portfolio',backup.portfolio.map(p=>({...p,imageBlob:base64ToBlob(p.imageBlob),thumbnailBlob:base64ToBlob(p.thumbnailBlob)}))),
            backup.settings&&AppState.db.put('settings',backup.settings)
          ].filter(Boolean));
          showToast('success','Restaurare completă. Se reîncarcă...');setTimeout(()=>location.reload(),1500);
        }catch(err){showToast('error','Eroare restaurare: '+err.message);}
      };
      inp.click();
    }

    async function _s10ExportLeadsCSV(){
      const[leads,clients,offers]=await Promise.all([AppState.db.getAll('leads'),AppState.db.getAll('clients'),AppState.db.getAll('offers')]);
      const cMap=Object.fromEntries(clients.map(c=>[c.id,c]));
      const rows=leads.map(l=>{
        const cl=cMap[l.clientId]||{};
        const lo=offers.filter(o=>o.leadId===l.id).sort((a,b)=>b.revision-a.revision)[0];
        return[lo?.offerCode||'',l.createdAt?.split('T')[0]||'',cl.name||'',l.address||'',l.typology||'',l.area||'',l.funnelType==='design'?'ARH/INT':'DB',l.sourceType||'',lo?.content?.totalPriceEUR||'',l.status||'',l.wonContractValue||'',l.scoreTotal||'',l.scoreCategory||''].join(';');
      });
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob(['﻿NR.OFERTA;DATA;CLIENT;ADRESA;TIP;MP;SPECIALITATI;SURSA;PRET;STATUS;CONTRACT;SCOR;CATEGORIE\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'}));
      a.download=`studioflow-leads-${new Date().toISOString().split('T')[0]}.csv`;a.click();
      showToast('success','CSV exportat.');
    }

    async function _s10CalcStorage(){
      const el=document.getElementById('s10-storage');if(!el)return;
      try{
        const all=await Promise.all(['studio','clients','leads','offers','activities','rateCards','settings'].map(s=>AppState.db.getAll(s)));
        const bytes=new TextEncoder().encode(JSON.stringify(all)).length;
        el.innerHTML=`Spațiu estimat (fără imagini): <strong>${(bytes/1024/1024).toFixed(2)} MB</strong>`;
      }catch{el.textContent='Nu s-a putut calcula.';}
    }

    async function _s10DeleteAll(){
      const ok=await showConfirmDialog({title:'Ștergere completă',message:'TOATE datele (leads, oferte, clienți, activități, setări) vor fi șterse definitiv.',confirmText:'STERGE',dangerKeyword:'STERGE'});
      if(!ok)return;
      await clearAllData(AppState.db);
      showToast('success','Date șterse. Se reîncarcă...');setTimeout(()=>location.reload(),1000);
    }

    async function _s10SaveRC(id,rate){
      const rc=await AppState.db.get('rateCards',id);if(!rc)return;
      await AppState.db.put('rateCards',{...rc,hourlyRateEUR:parseFloat(rate)||rc.hourlyRateEUR,updatedAt:new Date().toISOString()});
      showToast('success','Rate card salvat.');
    }

    async function _s10SetDefaultRC(id){
      const all=await AppState.db.getAll('rateCards');
      await Promise.all(all.map(rc=>AppState.db.put('rateCards',{...rc,isDefault:rc.id===id,updatedAt:new Date().toISOString()})));
      showToast('success','Rate card default setat.');renderSettings();
    }

    async function _s10DeleteRC(id){
      const ok=await showConfirmDialog({title:'Șterge rate card',message:'Ștergi definitiv acest rate card?',confirmText:'Șterge'});
      if(!ok)return;
      await AppState.db.delete('rateCards',id);showToast('success','Rate card șters.');renderSettings();
    }

    async function _s10AddRC(){
      const name=prompt('Nume rate card nou:');if(!name?.trim())return;
      await AppState.db.put('rateCards',{id:uuid(),name:name.trim(),currency:'EUR',hourlyRateEUR:65,isDefault:false,rates:{},createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
      showToast('success','Rate card adăugat.');renderSettings();
    }

    async function _s10SavePI(){
      const v=parseInt(document.getElementById('s10-pimin')?.value)||30;
      const st=await AppState.db.get('settings','settings')||{id:'settings'};
      await AppState.db.put('settings',{...st,priceIntelMinSamples:v,updatedAt:new Date().toISOString()});
      showToast('success','Price Intelligence salvat.');renderSettings();
    }

    async function _s10ResetWP(){
      const ok=await showConfirmDialog({title:'Reset ponderi',message:'Resetezi ponderile Win Probability la default (Scor 40%, Sursă 20%, Tipologie 15%, Preț 25%)?',confirmText:'Resetează'});
      if(!ok)return;
      const st=await AppState.db.get('settings','settings')||{id:'settings'};
      await AppState.db.put('settings',{...st,winProbWeights:{scoreWeight:.4,sourceWeight:.2,typologyWeight:.15,pricePositionWeight:.25},updatedAt:new Date().toISOString()});
      showToast('success','Ponderi resetate.');renderSettings();
    }

    function _s10ForceSwUpdate(){
      if(!navigator.serviceWorker?.controller){showToast('info','Niciun Service Worker activ.');return;}
      navigator.serviceWorker.controller.postMessage({type:'SKIP_WAITING'});
      showToast('success','Update solicitat — reîncarcă pagina pentru a aplica.');
    }
  </script>
  <script id="sf-export">   /* M16 — Export */    </script>
  <script id="sf-shortcuts">/* M17 — Keys */      </script>
  <script id="sf-init">
    document.addEventListener('DOMContentLoaded', initApp);
  </script>

</body>
</html>
