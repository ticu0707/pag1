<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudioFlow — HERTZ Studio</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1C3557">
  <style>
    /* ═══════════════════════════════════════════════════
       DESIGN SYSTEM — CSS Custom Properties
       PRD StudioFlow v6.0 § 3.1–3.4
    ═══════════════════════════════════════════════════ */
    :root {
      /* Brand Colors */
      --sf-primary:       #1C3557;
      --sf-primary-light: #264872;
      --sf-accent:        #C9963A;
      --sf-accent-light:  #DEB05A;

      /* Backgrounds */
      --sf-bg:            #F7F7F5;
      --sf-surface:       #FFFFFF;
      --sf-surface-2:     #F3F4F6;

      /* Status Colors */
      --sf-hot:           #16A34A;  --sf-hot-bg:    #DCFCE7;
      --sf-warm:          #D97706;  --sf-warm-bg:   #FEF3C7;
      --sf-cold:          #DC2626;  --sf-cold-bg:   #FEE2E2;
      --sf-info:          #2563EB;  --sf-info-bg:   #DBEAFE;

      /* Text */
      --sf-text:          #111827;
      --sf-text-2:        #6B7280;
      --sf-text-3:        #9CA3AF;
      --sf-text-inv:      #FFFFFF;

      /* Borders */
      --sf-border:        #E5E7EB;
      --sf-border-focus:  #1C3557;

      /* Typography */
      --sf-font:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --sf-font-num: 'Cascadia Code', 'Consolas', 'Courier New', monospace;

      /* Spacing */
      --sp-1: 4px;  --sp-2: 8px;   --sp-3: 12px;
      --sp-4: 16px; --sp-6: 24px;  --sp-8: 32px;  --sp-12: 48px;

      /* Layout */
      --sf-sidebar-w:    240px;
      --sf-sidebar-min:  60px;
      --sf-topbar-h:     56px;

      /* Shapes */
      --sf-r:    8px;
      --sf-r-sm: 4px;
      --sf-r-lg: 16px;
      --sf-r-pill: 999px;

      /* Shadows */
      --sf-shadow:    0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
      --sf-shadow-md: 0 4px 12px rgba(0,0,0,0.12);
      --sf-shadow-lg: 0 16px 40px rgba(0,0,0,0.16);

      /* Transitions */
      --sf-t: 150ms ease;
    }

    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--sf-font);
      font-size: 14px;
      color: var(--sf-text);
      background: var(--sf-bg);
      line-height: 1.5;
    }
    a { color: var(--sf-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul { list-style: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    input, textarea, select {
      font-family: inherit;
      font-size: 14px;
      color: var(--sf-text);
    }

    /* ── Layout Shell ──────────────────────────────── */
    .sf-body {
      display: grid;
      grid-template-columns: var(--sf-sidebar-w) 1fr;
      grid-template-rows: var(--sf-topbar-h) 1fr;
      grid-template-areas:
        "sidebar topbar"
        "sidebar main";
      height: 100vh;
      transition: grid-template-columns var(--sf-t);
    }
    .sf-body.sidebar-collapsed {
      grid-template-columns: var(--sf-sidebar-min) 1fr;
    }

    /* ── Sidebar ───────────────────────────────────── */
    .sf-sidebar {
      grid-area: sidebar;
      background: var(--sf-primary);
      color: var(--sf-text-inv);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow: hidden;
      transition: width var(--sf-t);
      z-index: 100;
    }
    .sf-sidebar__logo {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-4);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      min-height: var(--sf-topbar-h);
    }
    .sf-sidebar__logo-img {
      width: 32px;
      height: 32px;
      border-radius: var(--sf-r-sm);
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
    }
    .sf-sidebar__studio-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 1;
      transition: opacity var(--sf-t);
    }
    .sidebar-collapsed .sf-sidebar__studio-name { opacity: 0; pointer-events: none; }

    .sf-sidebar__nav {
      flex: 1;
      padding: var(--sp-2) 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sf-nav-item {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-4);
      cursor: pointer;
      border-radius: 0;
      transition: background var(--sf-t);
      white-space: nowrap;
      position: relative;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
    }
    .sf-nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .sf-nav-item.active {
      background: rgba(255,255,255,0.15);
      color: white;
      border-right: 3px solid var(--sf-accent);
    }
    .sf-nav-item svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .sf-nav-item span.label {
      opacity: 1;
      transition: opacity var(--sf-t);
      overflow: hidden;
    }
    .sidebar-collapsed .sf-nav-item span.label { opacity: 0; pointer-events: none; }
    .sf-nav-item .sf-badge-dot {
      background: var(--sf-accent);
      color: white;
      font-size: 11px;
      font-weight: 700;
      border-radius: var(--sf-r-pill);
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
      margin-left: auto;
    }
    .sidebar-collapsed .sf-badge-dot { display: none; }

    .sf-sidebar__footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: var(--sp-2) 0;
    }
    .sf-backup-status {
      padding: var(--sp-2) var(--sp-4);
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
    }
    .sf-backup-status:hover { color: white; }
    .sf-backup-status.ok    { color: var(--sf-hot); }
    .sf-backup-status.warn  { color: var(--sf-accent); }
    .sf-backup-status.error { color: var(--sf-cold); }
    .sidebar-collapsed .sf-backup-status span.backup-label { display: none; }

    /* ── Topbar ────────────────────────────────────── */
    .sf-topbar {
      grid-area: topbar;
      background: var(--sf-surface);
      border-bottom: 1px solid var(--sf-border);
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: 0 var(--sp-6);
      position: sticky;
      top: 0;
      z-index: 90;
      box-shadow: var(--sf-shadow);
    }
    .sf-search {
      flex: 1;
      max-width: 480px;
      border: 1px solid var(--sf-border);
      border-radius: var(--sf-r-sm);
      padding: 7px var(--sp-3);
      background: var(--sf-surface-2);
      outline: none;
      transition: border-color var(--sf-t), box-shadow var(--sf-t);
    }
    .sf-search:focus {
      border-color: var(--sf-border-focus);
      box-shadow: 0 0 0 2px rgba(28,53,87,0.15);
      background: var(--sf-surface);
    }
    .sf-topbar__actions { margin-left: auto; display: flex; gap: var(--sp-2); align-items: center; }

    /* ── Main Content ──────────────────────────────── */
    .sf-main {
      grid-area: main;
      overflow-y: auto;
      padding: var(--sp-6);
      background: var(--sf-bg);
    }
    .sf-page { display: block; }
    .sf-page[hidden] { display: none !important; }

    /* ── Buttons ───────────────────────────────────── */
    .sf-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      padding: 7px var(--sp-4);
      border-radius: var(--sf-r-sm);
      font-size: 14px;
      font-weight: 500;
      transition: background var(--sf-t), box-shadow var(--sf-t), opacity var(--sf-t);
      white-space: nowrap;
      cursor: pointer;
      border: none;
    }
    .sf-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .sf-btn--primary {
      background: var(--sf-primary);
      color: white;
    }
    .sf-btn--primary:hover:not(:disabled) { background: var(--sf-primary-light); }
    .sf-btn--secondary {
      background: transparent;
      border: 1px solid var(--sf-border);
      color: var(--sf-text);
    }
    .sf-btn--secondary:hover:not(:disabled) { background: var(--sf-surface-2); }
    .sf-btn--danger {
      background: var(--sf-cold);
      color: white;
    }
    .sf-btn--danger:hover:not(:disabled) { background: #b91c1c; }
    .sf-btn--ghost {
      background: transparent;
      color: var(--sf-primary);
    }
    .sf-btn--ghost:hover:not(:disabled) { background: rgba(28,53,87,0.06); }
    .sf-btn--icon {
      padding: 7px;
      border-radius: var(--sf-r-sm);
    }
    .sf-btn svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Badges ────────────────────────────────────── */
    .sf-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--sf-r-pill);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .sf-badge--hot  { background: var(--sf-hot-bg);  color: var(--sf-hot); }
    .sf-badge--warm { background: var(--sf-warm-bg); color: var(--sf-warm); }
    .sf-badge--cold { background: var(--sf-cold-bg); color: var(--sf-cold); }
    .sf-badge--info { background: var(--sf-info-bg); color: var(--sf-info); }
    .sf-badge--neutral { background: var(--sf-surface-2); color: var(--sf-text-2); }

    /* ── Cards ─────────────────────────────────────── */
    .sf-card {
      background: var(--sf-surface);
      border-radius: var(--sf-r);
      box-shadow: var(--sf-shadow);
      padding: var(--sp-4);
    }
    .sf-card--hover:hover {
      box-shadow: var(--sf-shadow-md);
      transform: translateY(-1px);
      transition: box-shadow var(--sf-t), transform var(--sf-t);
    }

    /* ── Inputs & Forms ────────────────────────────── */
    .sf-input, .sf-select, .sf-textarea {
      display: block;
      width: 100%;
      padding: 8px var(--sp-3);
      border: 1px solid var(--sf-border);
      border-radius: var(--sf-r-sm);
      background: var(--sf-surface);
      color: var(--sf-text);
      font-size: 14px;
      outline: none;
      transition: border-color var(--sf-t), box-shadow var(--sf-t);
    }
    .sf-input:focus, .sf-select:focus, .sf-textarea:focus {
      border-color: var(--sf-border-focus);
      box-shadow: 0 0 0 2px rgba(28,53,87,0.15);
    }
    .sf-textarea { resize: vertical; min-height: 80px; }
    .sf-form-group { margin-bottom: var(--sp-4); }
    .sf-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--sf-text-2);
      margin-bottom: var(--sp-1);
    }
    .sf-label--required::after { content: ' *'; color: var(--sf-cold); }

    /* ── Grid helpers ──────────────────────────────── */
    .sf-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
    .sf-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--sp-4); }
    .sf-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-4); }
    .sf-flex   { display: flex; align-items: center; gap: var(--sp-3); }
    .sf-flex-between { display: flex; align-items: center; justify-content: space-between; }

    /* ── Page Header ───────────────────────────────── */
    .sf-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-6);
    }
    .sf-page-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--sf-text);
    }
    .sf-page-subtitle {
      font-size: 13px;
      color: var(--sf-text-2);
      margin-top: 2px;
    }

    /* ── Table ─────────────────────────────────────── */
    .sf-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--sf-surface);
      border-radius: var(--sf-r);
      overflow: hidden;
      box-shadow: var(--sf-shadow);
    }
    .sf-table th {
      background: var(--sf-surface-2);
      padding: var(--sp-3) var(--sp-4);
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--sf-text-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--sf-border);
    }
    .sf-table td {
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--sf-border);
      font-size: 13px;
    }
    .sf-table tr:last-child td { border-bottom: none; }
    .sf-table tr:hover td { background: var(--sf-surface-2); }

    /* ── KPI Cards ─────────────────────────────────── */
    .sf-kpi {
      background: var(--sf-surface);
      border-radius: var(--sf-r);
      box-shadow: var(--sf-shadow);
      padding: var(--sp-4) var(--sp-6);
    }
    .sf-kpi__label { font-size: 12px; color: var(--sf-text-2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .sf-kpi__value { font-size: 28px; font-weight: 700; color: var(--sf-text); margin-top: var(--sp-1); font-family: var(--sf-font-num); }
    .sf-kpi__sub   { font-size: 12px; color: var(--sf-text-3); margin-top: 2px; }

    /* ── Toast Notifications ───────────────────────── */
    .sf-toasts {
      position: fixed;
      top: var(--sp-4);
      right: var(--sp-4);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      pointer-events: none;
    }
    .sf-toast {
      background: var(--sf-surface);
      border-radius: var(--sf-r);
      box-shadow: var(--sf-shadow-md);
      padding: var(--sp-3) var(--sp-4);
      font-size: 13px;
      max-width: 360px;
      pointer-events: all;
      border-left: 3px solid var(--sf-info);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      animation: sf-toast-in 200ms ease;
    }
    .sf-toast--success { border-left-color: var(--sf-hot); }
    .sf-toast--warning { border-left-color: var(--sf-warm); }
    .sf-toast--error   { border-left-color: var(--sf-cold); }
    .sf-toast--info    { border-left-color: var(--sf-info); }
    .sf-toast__icon  { flex-shrink: 0; font-size: 14px; }
    .sf-toast__msg   { flex: 1; line-height: 1.4; }
    .sf-toast__close { flex-shrink: 0; font-size: 16px; opacity: 0.5; background: none; border: none; cursor: pointer; padding: 0 2px; line-height: 1; }
    .sf-toast__close:hover { opacity: 1; }
    .sf-toast--dismiss { animation: sf-toast-out 300ms ease forwards; pointer-events: none; }
    @keyframes sf-toast-in {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes sf-toast-out {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(20px); }
    }

    /* ── Modal ─────────────────────────────────────── */
    .sf-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-4);
      animation: sf-overlay-in 150ms ease;
    }
    @keyframes sf-overlay-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .sf-modal {
      background: var(--sf-surface);
      border-radius: var(--sf-r-lg);
      box-shadow: var(--sf-shadow-lg);
      padding: var(--sp-8);
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: sf-modal-in 200ms ease;
    }
    .sf-modal--wide { max-width: 800px; }
    .sf-modal--fullscreen { max-width: 100%; max-height: 100%; border-radius: 0; }
    @keyframes sf-modal-in {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .sf-modal h2 { font-size: 18px; font-weight: 600; margin-bottom: var(--sp-4); color: var(--sf-text); }
    .sf-modal p  { font-size: 14px; color: var(--sf-text-2); margin-bottom: var(--sp-3); }
    .sf-modal-actions {
      display: flex;
      gap: var(--sp-3);
      justify-content: flex-end;
      margin-top: var(--sp-6);
    }
    .sf-confirm-hint { font-size: 13px; color: var(--sf-text-2); margin-top: var(--sp-4); }

    /* ── Divider ───────────────────────────────────── */
    .sf-divider {
      height: 1px;
      background: var(--sf-border);
      margin: var(--sp-6) 0;
    }

    /* ── Empty State ───────────────────────────────── */
    .sf-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-12) var(--sp-8);
      text-align: center;
      color: var(--sf-text-3);
    }
    .sf-empty__icon { font-size: 48px; margin-bottom: var(--sp-4); opacity: 0.5; }
    .sf-empty__title { font-size: 16px; font-weight: 500; color: var(--sf-text-2); margin-bottom: var(--sp-2); }
    .sf-empty__sub   { font-size: 13px; margin-bottom: var(--sp-6); }

    /* ── Kanban ────────────────────────────────────── */
    .sf-kanban {
      display: flex;
      gap: var(--sp-4);
      overflow-x: auto;
      padding-bottom: var(--sp-4);
      align-items: flex-start;
    }
    .sf-kanban-col {
      min-width: 260px;
      max-width: 300px;
      flex-shrink: 0;
      background: var(--sf-surface-2);
      border-radius: var(--sf-r);
      padding: var(--sp-3);
    }
    .sf-kanban-col__header {
      font-size: 13px;
      font-weight: 600;
      color: var(--sf-text-2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: var(--sp-2) var(--sp-1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-2);
    }
    .sf-kanban-col__count {
      background: var(--sf-border);
      border-radius: var(--sf-r-pill);
      padding: 1px 8px;
      font-size: 11px;
    }
    .sf-kanban-col__total {
      font-size: 11px;
      color: var(--sf-text-3);
      padding: 0 var(--sp-1) var(--sp-2);
      font-family: var(--sf-font-num);
    }
    .sf-kanban-col.drag-over { background: rgba(28,53,87,0.08); outline: 2px dashed var(--sf-primary); }
    .sf-kanban-cards { display: flex; flex-direction: column; gap: var(--sp-2); min-height: 40px; }

    .sf-lead-card {
      background: var(--sf-surface);
      border-radius: var(--sf-r);
      box-shadow: var(--sf-shadow);
      padding: var(--sp-3);
      cursor: pointer;
      transition: box-shadow var(--sf-t), transform var(--sf-t);
      border-left: 3px solid transparent;
    }
    .sf-lead-card:hover { box-shadow: var(--sf-shadow-md); transform: translateY(-1px); }
    .sf-lead-card.dragging { opacity: 0.5; }
    .sf-lead-card--hot  { border-left-color: var(--sf-hot); }
    .sf-lead-card--warm { border-left-color: var(--sf-warm); }
    .sf-lead-card--cold { border-left-color: var(--sf-cold); }

    .sf-lead-card__title { font-size: 13px; font-weight: 600; color: var(--sf-text); margin-bottom: 2px; }
    .sf-lead-card__sub   { font-size: 12px; color: var(--sf-text-2); margin-bottom: var(--sp-2); }
    .sf-lead-card__meta  { display: flex; gap: var(--sp-2); flex-wrap: wrap; align-items: center; margin-bottom: var(--sp-2); }
    .sf-lead-card__age   { font-size: 11px; padding: 1px 6px; border-radius: var(--sf-r-pill); }
    .sf-lead-card__age.age--good   { background: var(--sf-hot-bg);  color: var(--sf-hot); }
    .sf-lead-card__age.age--normal { background: var(--sf-surface-2); color: var(--sf-text-3); }
    .sf-lead-card__age.age--late   { background: var(--sf-warm-bg); color: var(--sf-warm); }
    .sf-lead-card__actions {
      display: flex;
      gap: var(--sp-1);
      margin-top: var(--sp-2);
      border-top: 1px solid var(--sf-border);
      padding-top: var(--sp-2);
    }
    .sf-lead-card__actions .sf-btn { font-size: 11px; padding: 4px 8px; }

    /* ── Scoring Panel ─────────────────────────────── */
    .sf-score-panel {
      background: var(--sf-surface-2);
      border-radius: var(--sf-r);
      padding: var(--sp-4);
    }
    .sf-score-total {
      font-size: 22px;
      font-weight: 700;
      font-family: var(--sf-font-num);
      margin-bottom: var(--sp-2);
    }
    .sf-score-bar {
      height: 6px;
      background: var(--sf-border);
      border-radius: var(--sf-r-pill);
      margin-bottom: var(--sp-4);
      overflow: hidden;
    }
    .sf-score-bar__fill {
      height: 100%;
      border-radius: var(--sf-r-pill);
      background: var(--sf-warm);
      transition: width 300ms ease, background 300ms ease;
    }
    .sf-score-bar__fill.hot  { background: var(--sf-hot); }
    .sf-score-bar__fill.warm { background: var(--sf-warm); }
    .sf-score-bar__fill.cold { background: var(--sf-cold); }

    .sf-criterion {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: var(--sp-2);
    }
    .sf-criterion__label {
      font-size: 12px;
      color: var(--sf-text-2);
      flex: 1;
      min-width: 0;
    }
    .sf-criterion__slider {
      width: 120px;
      flex-shrink: 0;
      accent-color: var(--sf-primary);
    }
    .sf-criterion__value {
      width: 24px;
      text-align: right;
      font-size: 12px;
      font-family: var(--sf-font-num);
      font-weight: 600;
      color: var(--sf-primary);
      flex-shrink: 0;
    }

    /* ── Setup Wizard ──────────────────────────────── */
    .sf-wizard {
      position: fixed;
      inset: 0;
      background: var(--sf-bg);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8);
    }
    .sf-wizard__card {
      background: var(--sf-surface);
      border-radius: var(--sf-r-lg);
      box-shadow: var(--sf-shadow-lg);
      padding: var(--sp-8);
      max-width: 560px;
      width: 100%;
    }
    .sf-wizard__step-indicator {
      display: flex;
      gap: var(--sp-2);
      margin-bottom: var(--sp-6);
    }

      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--sf-border);
    }

    .sf-wizard__subtitle { font-size: 14px; color: var(--sf-text-2); margin-bottom: var(--sp-6); }
    .sf-wizard__actions {
      display: flex;
      gap: var(--sp-3);
      justify-content: space-between;
      margin-top: var(--sp-6);
    }

    /* ── KPI Cards (wizard + import report) ───────── */
    .sf-kpi-grid  { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--sp-4); margin-bottom: var(--sp-4); }
    .sf-kpi-card  { background: var(--sf-surface-2); border-radius: var(--sf-r); padding: var(--sp-3) var(--sp-4); text-align: center; }

    .sf-kpi-label { font-size: 12px; color: var(--sf-text-2); margin-top: 2px; }

    /* ── Modal header / title / body ───────────────── */
    .sf-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-4); }
    .sf-modal-title  { font-size: 18px; font-weight: 600; color: var(--sf-text); }
    .sf-modal-body   { color: var(--sf-text-2); }
    .sf-modal--danger { border-top: 3px solid var(--sf-cold); }

    /* ── Misc ──────────────────────────────────────── */
    .sf-spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--sf-border);
      border-top-color: var(--sf-primary);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sf-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--sf-surface-2);
      border: 1px solid var(--sf-border);
      border-radius: var(--sf-r-pill);
      padding: 2px 8px;
      font-size: 12px;
      color: var(--sf-text-2);
    }

    .text-muted { color: var(--sf-text-2); }

    .text-mono  { font-family: var(--sf-font-num); }
    .mt-1 { margin-top: var(--sp-1); }
    .mt-2 { margin-top: var(--sp-2); }
    .mt-4 { margin-top: var(--sp-4); }
    .mb-4 { margin-bottom: var(--sp-4); }
    .w-full { width: 100%; }

    .sf-nav-item[data-tooltip]:hover::after {

  <script id="sf-utils">
    function uuid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d)) return '—';
      const months = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
      return `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()}`;
    }

    function daysDiff(a, b) {
      const da = new Date(a), db = new Date(b);
      return Math.round((db - da) / 86400000);
    }

    function addDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }
  </script>
  <script id="sf-db">
    class DB {
      constructor(idb) { this._idb = idb; }

      get(store, key) {
        return new Promise((res, rej) => {
          const req = this._idb.transaction(store,'readonly').objectStore(store).get(key);
          req.onsuccess = () => res(req.result ?? null);
          req.onerror  = () => rej(req.error);
        });
      }
      getAll(store) {
        return new Promise((res, rej) => {
          const req = this._idb.transaction(store,'readonly').objectStore(store).getAll();
          req.onsuccess = () => res(req.result);
          req.onerror  = () => rej(req.error);
        });
      }
      getAllByIndex(store, indexName, query) {
        return new Promise((res, rej) => {
          const req = this._idb.transaction(store,'readonly')
            .objectStore(store).index(indexName).getAll(query);
          req.onsuccess = () => res(req.result);
          req.onerror  = () => rej(req.error);
        });
      }
      put(store, value) {
        return new Promise((res, rej) => {
          const req = this._idb.transaction(store,'readwrite').objectStore(store).put(value);
          req.onsuccess = () => res(req.result);
          req.onerror  = () => rej(req.error);
        });
      }
      delete(store, key) {
        return new Promise((res, rej) => {
          const req = this._idb.transaction(store,'readwrite').objectStore(store).delete(key);
          req.onsuccess = () => res(req.result);
          req.onerror  = () => rej(req.error);
        });
      }
      putBulk(store, values) {
        return new Promise((res, rej) => {
          const tx = this._idb.transaction(store,'readwrite');
          const os = tx.objectStore(store);
          values.forEach(v => os.put(v));
          tx.oncomplete = () => res();
          tx.onerror    = () => rej(tx.error);
        });
      }
      count(store) {
        return new Promise((res, rej) => {
          const req = this._idb.transaction(store,'readonly').objectStore(store).count();
          req.onsuccess = () => res(req.result);
          req.onerror  = () => rej(req.error);
        });
      }
    }

    const CURRENT_VERSION = 1;

    const MIGRATIONS = {
      1: (db) => {
        db.createObjectStore('studio', { keyPath: 'id' });
        const clients = db.createObjectStore('clients', { keyPath: 'id' });
        clients.createIndex('name',      'name',      { unique: false });
        clients.createIndex('createdAt', 'createdAt', { unique: false });
        const leads = db.createObjectStore('leads', { keyPath: 'id' });
        leads.createIndex('clientId',      'clientId',      { unique: false });
        leads.createIndex('status',        'status',        { unique: false });
        leads.createIndex('funnelType',    'funnelType',    { unique: false });
        leads.createIndex('pipelineStage', 'pipelineStage', { unique: false });
        leads.createIndex('scoreCategory', 'scoreCategory', { unique: false });
        leads.createIndex('createdAt',     'createdAt',     { unique: false });
        const offers = db.createObjectStore('offers', { keyPath: 'id' });
        offers.createIndex('leadId',    'leadId',    { unique: false });
        offers.createIndex('type',      'type',      { unique: false });
        offers.createIndex('status',    'status',    { unique: false });
        offers.createIndex('offerCode', 'offerCode', { unique: false });
        offers.createIndex('createdAt', 'createdAt', { unique: false });
        const activities = db.createObjectStore('activities', { keyPath: 'id' });
        activities.createIndex('leadId',        'leadId',        { unique: false });
        activities.createIndex('scheduledAt',   'scheduledAt',   { unique: false });
        activities.createIndex('completedAt',   'completedAt',   { unique: false });
        activities.createIndex('isAutoCadence', 'isAutoCadence', { unique: false });
        const portfolio = db.createObjectStore('portfolio', { keyPath: 'id' });
        portfolio.createIndex('category',  'category',  { unique: false });
        portfolio.createIndex('sortOrder', 'sortOrder', { unique: false });
        const rateCards = db.createObjectStore('rateCards', { keyPath: 'id' });
        rateCards.createIndex('isDefault', 'isDefault', { unique: false });
        db.createObjectStore('settings', { keyPath: 'id' });
      }
    };

    async function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('studioflow', CURRENT_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          const oldVersion = e.oldVersion;
          for (let v = oldVersion + 1; v <= CURRENT_VERSION; v++) {
            MIGRATIONS[v]?.(db, e.target.transaction);
          }
        };
        req.onsuccess = (e) => resolve(new DB(e.target.result));
        req.onerror   = (e) => reject(e.target.error);
        req.onblocked = ()  => reject(new Error('IndexedDB blocat — închide alte tab-uri StudioFlow'));
      });
    }
  </script>

  <script id="sf-ui">
    function showToast(type, message, durationMs = 4000) {
      const root = document.getElementById('sf-toast-root');
      if (!root) return;
      const toast = document.createElement('div');
      toast.className = `sf-toast sf-toast--${type}`;
      const icons = { success: '✓', warning: '⚠', error: '✕', info: 'ℹ' };
      toast.innerHTML = `<span class="sf-toast__icon">${icons[type] || 'ℹ'}</span>
        <span class="sf-toast__msg">${message}</span>
        <button class="sf-toast__close" onclick="this.parentElement.remove()">×</button>`;
      root.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('sf-toast--dismiss');
        toast.addEventListener('animationend', () => toast.remove(), { once: true });
      }, durationMs);
    }

    function showConfirmDialog({ title, message, confirmText, dangerKeyword }) {
      return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.className = 'sf-modal-overlay';
        overlay.innerHTML = `
          <div class="sf-modal sf-modal--danger">
            <div class="sf-modal-header"><h2 class="sf-modal-title">${title}</h2></div>
            <div class="sf-modal-body">
              <p>${message}</p>
              ${dangerKeyword ? `
                <p class="sf-confirm-hint">Tastează <strong>${dangerKeyword}</strong> pentru confirmare:</p>
                <input id="sf-confirm-input" type="text" class="sf-input" placeholder="${dangerKeyword}">
              ` : ''}
            </div>
            <div class="sf-modal-actions">
              <button class="sf-btn sf-btn--secondary" id="sf-confirm-cancel">Anulează</button>
              <button class="sf-btn sf-btn--danger" id="sf-confirm-ok" ${dangerKeyword ? 'disabled' : ''}>
                ${confirmText || 'Confirmă'}
              </button>
            </div>
          </div>`;

        if (dangerKeyword) {
          overlay.querySelector('#sf-confirm-input').addEventListener('input', e => {
            overlay.querySelector('#sf-confirm-ok').disabled = (e.target.value !== dangerKeyword);
          });
        }

        overlay.querySelector('#sf-confirm-cancel').onclick = () => { overlay.remove(); resolve(false); };
        overlay.querySelector('#sf-confirm-ok').onclick = () => { overlay.remove(); resolve(true); };
        overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); resolve(false); } });
        document.body.appendChild(overlay);
      });
    }

    function showModal(htmlContent, options = {}) {
      const root = document.getElementById('sf-modal-root');
      if (!root) return;
      root.hidden = false;
      root.innerHTML = `
        <div class="sf-modal-overlay" id="sf-modal-overlay">
          <div class="sf-modal ${options.wide ? 'sf-modal--wide' : ''}">
            ${options.title ? `<div class="sf-modal-header">
              <h2 class="sf-modal-title">${options.title}</h2>
              <button class="sf-btn sf-btn--icon" onclick="closeModal()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>` : ''}
            <div class="sf-modal-body">${htmlContent}</div>
          </div>
        </div>`;
      if (!options.noOverlayClose) {
        root.querySelector('#sf-modal-overlay').addEventListener('click', e => {
          if (e.target.id === 'sf-modal-overlay') closeModal();
        });
      }
    }

    function closeModal() {
      const root = document.getElementById('sf-modal-root');
      if (root) { root.hidden = true; root.innerHTML = ''; }
    }
  </script>
  <script id="sf-f8">
    function showFatalError(err) {
      const btnStyle = 'padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-size:14px';
      document.body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;
                    justify-content:center;height:100vh;font-family:sans-serif;padding:40px">
          <h1 style="color:#DC2626">⚠ StudioFlow nu a putut porni</h1>
          <p style="color:#374151;max-width:480px;text-align:center">
            Baza de date locală nu s-a putut deschide.<br>
            <strong>Cauze posibile:</strong> mod incognito, spațiu disk insuficient,
            alt tab cu app-ul deschis.
          </p>
          <p style="color:#6B7280;font-size:13px">Eroare tehnică: ${err.message}</p>
          <div style="display:flex;gap:16px;margin-top:24px">
            <button onclick="location.reload()"
              style="${btnStyle};background:#1C3557;color:white">Reîncarcă</button>
            <button onclick="clearIDBAndReload()"
              style="${btnStyle};background:#FEE2E2;color:#DC2626">Reset database</button>
          </div>
        </div>`;
    }

    function clearIDBAndReload() {
      const req = indexedDB.deleteDatabase('studioflow');
      req.onsuccess = () => location.reload();
      req.onerror   = () => location.reload();
    }

    function renderSidebarLogo(blob) {
      const el = document.getElementById('sf-logo');
      if (!el || !blob) return;
      const url = URL.createObjectURL(blob);
      el.innerHTML = `<img src="${url}" alt="Logo"
        style="width:100%;height:100%;object-fit:contain;border-radius:4px">`;
    }

    function renderSidebarStudioName(name) {
      const el = document.getElementById('sf-studio-name');
      if (el) el.textContent = name || 'HERTZ Studio';
    }

    function updateBackupStatusUI(status, msg) {
      const el = document.getElementById('sf-backup-status');
      if (!el) return;
      el.className = 'sf-backup-status';
      const label = el.querySelector('.backup-label');
      if (status === 'success') {
        el.classList.add('ok');
        const t = new Date().toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit' });
        if (label) label.textContent = `✓ Backup: ${t}`;
        el.title = 'Backup efectuat cu succes';
      } else if (status === 'error') {
        el.classList.add('error');
        if (label) label.textContent = '✕ Backup eșuat';
        el.title = msg || 'Backup eșuat';
      } else {
        if (label) label.textContent = '⚠ Fără backup';
        el.title = 'Fără backup în această sesiune';
      }
    }

    // Override stub-ul din M1 cu versiunea completă
    function onBackupStatusClick() {
      showModal(`
        <p style="margin-bottom:16px">Backup-ul automat se salvează în folderul selectat.
        Folderul trebuie re-selectat la fiecare pornire a aplicației.</p>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="sf-btn sf-btn--primary" onclick="selectBackupFolder();closeModal()">
            📂 Selectează folder (această sesiune)
          </button>
          <button class="sf-btn sf-btn--secondary" onclick="manualExportBackup();closeModal()">
            ⬇ Export manual acum (JSON)
          </button>
        </div>
      `, { title: 'Backup date' });
    }

    function blobToBase64(blob) {
      if (!blob) return Promise.resolve(null);
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror   = () => reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    async function exportAllData(db) {
      const [studio, clients, leads, offers, activities, portfolio, rateCards, settings] =
        await Promise.all([
          db.get('studio', 1),
          db.getAll('clients'),
          db.getAll('leads'),
          db.getAll('offers'),
          db.getAll('activities'),
          db.getAll('portfolio'),
          db.getAll('rateCards'),
          db.get('settings', 'settings')
        ]);
      const portfolioSerialized = await Promise.all(portfolio.map(async p => ({
        ...p,
        imageBlob:     await blobToBase64(p.imageBlob),
        thumbnailBlob: await blobToBase64(p.thumbnailBlob)
      })));
      return {
        _meta: { version: CURRENT_VERSION, exportedAt: new Date().toISOString(), appVersion: APP_VERSION },
        studio, clients, leads, offers, activities,
        portfolio: portfolioSerialized,
        rateCards, settings
      };
    }

    async function autoBackup() {
      const handle = AppState.backupFolderHandle;
      if (!handle) return;
      try {
        const perm = await handle.queryPermission({ mode: 'readwrite' });
        if (perm !== 'granted') await handle.requestPermission({ mode: 'readwrite' });
        const data     = await exportAllData(AppState.db);
        const filename = `studioflow-${new Date().toISOString().split('T')[0]}.json`;
        const fh       = await handle.getFileHandle(filename, { create: true });
        const writable = await fh.createWritable();
        await writable.write(JSON.stringify(data, null, 2));
        await writable.close();
        const settings = await AppState.db.get('settings', 'settings');
        await AppState.db.put('settings', { ...settings, lastBackupAt: new Date().toISOString() });
        updateBackupStatusUI('success');
      } catch (err) {
        updateBackupStatusUI('error', err.message);
      }
    }

    async function manualExportBackup() {
      const data = await exportAllData(AppState.db);
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), {
        href: url,
        download: `studioflow-backup-${new Date().toISOString().split('T')[0]}.json`
      });
      a.click();
      URL.revokeObjectURL(url);
      showToast('success', 'Backup exportat local.');
    }

    async function selectBackupFolder() {
      if (!window.showDirectoryPicker) {
        showToast('warning', 'Browser-ul tău nu suportă selectarea automată a folderului. Folosește Export manual.');
        return;
      }
      try {
        AppState.backupFolderHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        showToast('success', 'Folder backup selectat. Backup automat activat pentru această sesiune.');
        autoBackup();
      } catch { /* user cancelled */ }
    }

    function scheduleBackupCheck() {
      setInterval(() => autoBackup(), 30 * 60 * 1000);
    }

    function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.register('./sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              showToast('info', 'Versiune nouă disponibilă. <a href="#" onclick="location.reload()">Reîncarcă</a>', 8000);
            }
          });
        });
      });
    }

    async function initApp() {
      try {
        AppState.db = await openDB();
      } catch (err) {
        showFatalError(err);
        return;
      }
      const studio = await AppState.db.get('studio', 1);
      if (!studio) {
        document.getElementById('page-setup').hidden = false;
        if (typeof runSetupWizard === 'function') runSetupWizard();
      } else {
        renderSidebarLogo(studio.logoBlob);
        renderSidebarStudioName(studio.name);
        navigate(location.hash || '#today');
        // Dispatch manual în caz că hash-ul nu s-a schimbat (reload pe aceeași pagină)
        window.dispatchEvent(new Event('hashchange'));
        scheduleBackupCheck();
        registerServiceWorker();
      }
    }
  </script>

    // ── Image compression ────────────────────────────────────
    async function compressImage(file, maxKB = 200, maxDim = 800) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              const r = Math.min(maxDim/w, maxDim/h);
              w = Math.round(w*r); h = Math.round(h*r);
            }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            let q = 0.90;
            const compress = () => canvas.toBlob(blob => {
              if (!blob) { resolve(null); return; }
              if (blob.size <= maxKB * 1024 || q < 0.30) resolve(blob);
              else { q -= 0.10; compress(); }
            }, 'image/jpeg', q);
            compress();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── CSV parsing & import ─────────────────────────────────
    function readFileAsText(file, encoding = 'utf-8') {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = () => rej(r.error);
        r.readAsText(file, encoding);
      });
    }

    function parseCSV(text) {
      const clean = text.replace(/^﻿/, '');
      const lines = clean.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return [];
      const sep = (lines[0].match(/;/g)||[]).length > (lines[0].match(/,/g)||[]).length ? ';' : ',';
      const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g,''));
      return lines.slice(1).map(line => {
        const vals = line.split(sep).map(v => v.trim().replace(/^"|"$/g,''));
        return Object.fromEntries(headers.map((h,i) => [h, vals[i]??'']));
      });
    }

    async function importCSV(file) {
      let text;
      try { text = await readFileAsText(file, 'utf-8'); }
      catch { showToast('error', 'Nu s-a putut citi fișierul CSV.'); return; }
      const rows = parseCSV(text);
      if (!rows.length) { showToast('warning', 'CSV gol sau format nerecunoscut.'); return; }
      const errors = [], warnings = [], imported = { clients: 0, leads: 0, offers: 0 };
      for (const [i, row] of rows.entries()) {
        try { await importRow(row, imported, warnings); }
        catch (err) { errors.push({ row: i+2, data: row['CLIENT'], error: err.message }); }
      }
      showImportReport({ imported, errors, warnings });
    }

    function mapSource(raw) {
      return SOURCE_LOOKUP[raw?.toLowerCase().trim()] || 'other';
    }

    async function importRow(row, imported, warnings) {
      if (!row['CLIENT']?.trim())    throw new Error('CLIENT lipsă');
      if (!row['NR.OFERTA']?.trim()) throw new Error('NR.OFERTA lipsă');
      const db = AppState.db;
      const existing = await db.getAllByIndex('offers', 'offerCode', row['NR.OFERTA'].trim());
      if (existing.length) { warnings.push(`Duplicat ${row['NR.OFERTA'].trim()} — sărit`); return; }

      const allClients = await db.getAll('clients');
      let client = allClients.find(c => c.name.toLowerCase() === row['CLIENT'].trim().toLowerCase());
      if (!client) {
        client = { id: uuid(), name: row['CLIENT'].trim(), type: 'company', contactPerson: '',
          email: '', phone: '', address: '', fiscalCode: '', totalContractsValue: 0,
          totalContractsCount: 0, ltvFormula: 'sum_contracts', relationshipRating: 3,
          lastDealDate: null, reengagementAlertDays: 365, notes: '', tags: [],
          createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
        await db.put('clients', client);
        imported.clients++;
      }

      let createdAt = new Date().toISOString();
      const dp = row['DATA (REV.00)']?.split('.');
      if (dp?.length === 3) {
        const d = new Date(+dp[2], +dp[1]-1, +dp[0]);
        if (!isNaN(d)) createdAt = d.toISOString();
      }

      const funnel  = row['SPECIALITATI']?.toLowerCase();
      const funnelType = funnel === 'db' ? 'discovery' : 'design';
      const rawSt   = row['STATUS'];
      const status  = rawSt === '1' ? 'won' : rawSt === '-1' ? 'withdrawn' : 'lost';
      const rawTyp  = row['TIP PROIECT']?.trim().toUpperCase();
      const typology = ['T1','T2','T3','T4','T5','T6'].includes(rawTyp) ? rawTyp : 'T1';
      const emptyScore = { profitabilitateBruta:0,termenLivrare:0,clientRecurent:0,
        claritate_brief:0,interesStrategic:0,dificultateTehnLegala:0,alinieEstetica:0,
        plata:0,disponibilitateEchipa:0,impactReputational:0,incarcareEchipaInterna:0,
        capacitateColaboratori:0,cashflowIntern:0,timpOnboarding:0 };

      const lead = { id: uuid(), clientId: client.id,
        projectName: row['ADRESA']?.trim() || row['CLIENT'].trim(),
        address: row['ADRESA']?.trim() || '', area: parseFloat(row['S.D.'])||null,
        typology, funnelType, sourceType: mapSource(row['SURSA LEAD']),
        sourceDetail: row['SURSA LEAD']?.trim() || '',
        status, wonContractValue: parseFloat(row['VALOARE CONTRACT'])||null,
        estimatedEndDate: null,
        pipelineStage: status === 'won' ? 'contractat' : 'pierdut',
        stageEnteredAt: createdAt, score: emptyScore, scoreTotal: 0, scoreCategory: 'cold',
        goNoGo: 'nogo', winProbability: null,
        createdAt, updatedAt: new Date().toISOString() };
      await db.put('leads', lead);
      imported.leads++;

      const offer = { id: uuid(), leadId: lead.id, clientId: client.id,
        offerCode: row['NR.OFERTA'].trim(), type: funnelType,
        status: row['CONTRACT']?.trim().toUpperCase() === 'DA' ? 'won' : 'sent',
        revisionNumber: 0,
        content: { approach: row['FAZE']?.trim()||'',
                   totalPriceEUR: parseFloat(row['PRET OFERTAT (REV.00)'])||0 },
        createdAt, updatedAt: new Date().toISOString() };
      await db.put('offers', offer);
      imported.offers++;
    }

    function showImportReport({ imported, errors, warnings }) {
      const errHTML = errors.length ? `
        <h4 style="margin-top:16px">Erori (${errors.length} rânduri sărite)</h4>
        <table class="sf-table"><thead><tr><th>Rând</th><th>Client</th><th>Eroare</th></tr></thead>
        <tbody>${errors.map(e=>`<tr><td>${e.row}</td><td>${e.data||'—'}</td><td>${e.error}</td></tr>`).join('')}
        </tbody></table>` : '';
      const warnHTML = warnings.length ? `
        <h4 style="margin-top:16px">Avertismente</h4>
        <ul class="text-sm">${warnings.map(w=>`<li>${w}</li>`).join('')}</ul>` : '';
      showModal(`
        <div class="sf-kpi-grid">
          <div class="sf-kpi-card"><div class="sf-kpi-value">${imported.clients}</div><div class="sf-kpi-label">Clienți</div></div>
          <div class="sf-kpi-card"><div class="sf-kpi-value">${imported.leads}</div><div class="sf-kpi-label">Leads</div></div>
          <div class="sf-kpi-card"><div class="sf-kpi-value">${imported.offers}</div><div class="sf-kpi-label">Oferte</div></div>
        </div>${errHTML}${warnHTML}
        <div class="sf-form-actions" style="margin-top:16px">
          <button class="sf-btn sf-btn--primary" onclick="closeModal();renderSetupStep(6)">Continuă →</button>
        </div>`, { title: 'Raport Import CSV', wide: true });
    }

  <script id="sf-f2">
    // ── Scoring constants ────────────────────────────────────────────
    const SCORING_CRITERIA = [
      { key:'profitabilitateBruta',   label:'Profitabilitate brută',    hint:'0=pierdere · 10=profit excelent' },
      { key:'termenLivrare',          label:'Termen de livrare',         hint:'0=imposibil · 10=confortabil' },
      { key:'clientRecurent',         label:'Client recurent',            hint:'0=prim contact · 10=client fidel' },

      { key:'dificultateTehnLegala',  label:'Complexitate tech/legală',   hint:'0=extrem complex · 10=standard' },
      { key:'alinieEstetica',         label:'Aliniere estetică',          hint:'0=contrar · 10=perfect aliniat' },
      { key:'plata',                  label:'Comportament la plată',      hint:'0=risc neplată · 10=plătitor rapid' },
      { key:'disponibilitateEchipa',  label:'Disponibilitate echipă',     hint:'0=echipa plină · 10=capacitate liberă' },
      { key:'impactReputational',     label:'Impact reputațional',        hint:'0=risc reputație · 10=vizibilitate max' },

      { key:'capacitateColaboratori', label:'Capacitate colaboratori',    hint:'0=indisponibili · 10=disponibili' },

    ];
    const SOURCE_LABELS = {
      recomandare_colaboratori:'Rec. colaboratori', recomandare_clienti:'Rec. clienți',
      client_recurent:'Client recurent', recomandare_cunostinte:'Rec. cunoștințe',
      contact_direct:'Contact direct', other:'Altă sursă'
    };

    // ── Pure helpers ─────────────────────────────────────────────────
    function computeScoreTotal(score) {
      return SCORING_CRITERIA.reduce((s,c) => s + (Number(score[c.key]) || 0), 0);
    }
    function getScoreCategory(total) {
      return total >= 105 ? 'hot' : total >= 70 ? 'warm' : 'cold';
    }
    function getPricePosition(priceEUR, intel) {
      if (!intel || intel.confidenceFlag === 'insufficient_data') return null;
      const dev = (priceEUR - intel.historicalRange.median) / intel.historicalRange.median;
      return dev < -0.10 ? -1 : dev > 0.10 ? 1 : 0;
    }
    function getWinRateBySource(src, hist) {
      const rel = hist.filter(l => l.sourceType === src && ['won','lost'].includes(l.status));
      return rel.length < 5 ? (DEFAULT_SOURCE_RATES[src] ?? DEFAULT_SOURCE_RATES._global) : rel.filter(l=>l.status==='won').length/rel.length;
    }
    function getWinRateByTypology(typ, hist) {
      const rel = hist.filter(l => l.typology === typ && ['won','lost'].includes(l.status));
      return rel.length < 5 ? (DEFAULT_TYPOLOGY_RATES[typ] ?? DEFAULT_TYPOLOGY_RATES._global) : rel.filter(l=>l.status==='won').length/rel.length;
    }
    function computeWinProbability(lead, settings, hist=[], intel=null) {
      const w = settings.winProbWeights;
      const pricePos = getPricePosition(lead.estimatedValue, intel);
      const raw = (lead.scoreTotal/140)*w.scoreWeight
                + getWinRateBySource(lead.sourceType, hist)*w.sourceWeight
                + getWinRateByTypology(lead.typology, hist)*w.typologyWeight
                + (pricePos===null ? 0.5 : Math.max(0,0.5-pricePos*0.15))*w.pricePositionWeight;
      return Math.round(Math.min(95, Math.max(5, raw*100)));
    }

    async function computeGoNoGo(lead, db) {
      const [settings, studio, allLeads] = await Promise.all([
        db.get('settings','settings'), db.get('studio',1), db.getAll('leads')
      ]);
      const reasons = []; let decision = 'go';
      const today = new Date().toISOString();
      if ((lead.scoreTotal||0) < settings.goNoGoRules.minScore) {
        decision='nogo'; reasons.push(`Scor ${lead.scoreTotal} sub minimul ${settings.goNoGoRules.minScore}`);
      }
      const activeWon = allLeads.filter(l => l.status==='won' && l.estimatedEndDate && l.estimatedEndDate>today);
      if (activeWon.length >= studio.activeProjectsLimit) {
        decision='nogo'; reasons.push(`Proiecte active (${activeWon.length}) ≥ limita (${studio.activeProjectsLimit})`);
      }
      const hist = allLeads.filter(l => ['won','lost'].includes(l.status));
      const winProbability = computeWinProbability(lead, settings, hist, null);
      return { decision, reason: reasons.join(' | ') || 'Toate criteriile îndeplinite', winProbability, sampleSize: hist.length };
    }

    // ── Scoring panel ─────────────────────────────────────────────────

          </div>

          ${SCORING_CRITERIA.map(c=>`
            <div class="sf-criterion" title="${c.hint}">
              <span class="sf-criterion__label">${c.label}</span>
              <input type="range" class="sf-criterion__slider" min="0" max="10" value="${score[c.key]||0}" data-key="${c.key}">
              <span class="sf-criterion__value">${score[c.key]||0}</span>
            </div>`).join('')}
        </div>`;
      container.querySelectorAll('input[type=range]').forEach(sl => {
        sl.addEventListener('input', () => {
          sl.nextElementSibling.textContent = sl.value;
          score[sl.dataset.key] = Number(sl.value);

          container.querySelector('.sf-score-total').textContent = `${t} / 140`;
          container.querySelector('.sf-badge').className = `sf-badge sf-badge--${c}`;
          container.querySelector('.sf-badge').textContent = c.toUpperCase();
          container.querySelector('#sp-fill').className = `sf-score-bar__fill ${c}`;
          container.querySelector('#sp-fill').style.width = Math.round(t/140*100)+'%';
          onChange && onChange(score);
        });
      });
    }

          <button class="sf-btn sf-btn--secondary" onclick="closeModal()">✕</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start">
          <div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
              <div>
                <label class="sf-label">Client *</label>
                <select class="sf-select" id="f2-client">${cOpts||'<option value="">— adaugă mai jos —</option>'}</select>
                <a href="#" onclick="document.getElementById('f2-nc').hidden=!document.getElementById('f2-nc').hidden;return false"
                  style="font-size:11px;display:block;margin-top:3px">+ client nou</a>
                <div id="f2-nc" hidden style="display:flex;gap:6px;margin-top:6px">
                  <input class="sf-input" id="f2-nc-name" placeholder="Nume client" style="flex:1">
