                  </select>
                  <button class="sf-btn sf-btn--secondary" onclick="createClientInline()" style="font-size:11px;padding:3px 8px">+</button>
                </div>
              </div>
              <div><label class="sf-label">Funnel *</label>
                <select class="sf-select" id="f2-funnel">
                  <option value="discovery" ${existing?.funnelType==='discovery'||!existing?'selected':''}>Discovery</option>
                  <option value="design" ${existing?.funnelType==='design'?'selected':''}>Design</option>
                </select></div>
              <div><label class="sf-label">Nume proiect *</label>
                <input class="sf-input" id="f2-name" value="${existing?.projectName||''}" placeholder="ex: Vilă Chitila"></div>
              <div><label class="sf-label">Adresă</label>
                <input class="sf-input" id="f2-addr" value="${existing?.address||''}"></div>
              <div><label class="sf-label">Suprafață (mp)</label>
                <input class="sf-input" type="number" id="f2-area" value="${existing?.area||''}"></div>
              <div><label class="sf-label">Tipologie *</label>
                <select class="sf-select" id="f2-typo">${tOpts}</select></div>
              <div><label class="sf-label">Sursă</label>
                <select class="sf-select" id="f2-source">${sOpts}</select></div>
              <div><label class="sf-label">Detaliu sursă</label>
                <input class="sf-input" id="f2-src-detail" value="${existing?.sourceDetail||''}"></div>
              <div><label class="sf-label">Valoare estimată (EUR)</label>
                <input class="sf-input" type="number" id="f2-value" value="${existing?.estimatedValue||''}"></div>
              <div><label class="sf-label">Data estimată finalizare</label>
                <input class="sf-input" type="date" id="f2-end-date" value="${existing?.estimatedEndDate?.slice(0,10)||''}"></div>
            </div>
            <div id="f2-gng" style="margin-bottom:12px"></div>
            <div style="display:flex;gap:8px">
              <button class="sf-btn sf-btn--primary" onclick="saveLead('${leadId||''}')">${leadId?'Salvează modificări':'Creează lead'}</button>
              <button class="sf-btn sf-btn--secondary" onclick="closeModal()">Anulează</button>
            </div>
          </div>
          <div id="f2-score-panel"></div>
        </div>`, { wide: true });

      const panelEl = document.getElementById('f2-score-panel');
      const refreshGng = async () => {
        const tmp = { scoreTotal:computeScoreTotal(score), sourceType:document.getElementById('f2-source')?.value,
          typology:document.getElementById('f2-typo')?.value,
          estimatedValue:Number(document.getElementById('f2-value')?.value)||0 };
        const gng = await computeGoNoGo(tmp, AppState.db);
        const el = document.getElementById('f2-gng');
        if (el) el.innerHTML=`<div style="display:flex;gap:10px;align-items:center;padding:8px 12px;background:var(--sf-surface-2);border-radius:8px;font-size:13px">
          <span style="font-weight:700;color:var(--sf-${gng.decision==='go'?'hot':'cold'})">${gng.decision==='go'?'✓ GO':'✕ NO-GO'}</span>
          <span style="color:var(--sf-text-2);flex:1">${gng.reason}</span>
          <span style="font-weight:600">${gng.winProbability}% <span style="font-size:11px;color:var(--sf-text-3)">(n=${gng.sampleSize})</span></span>
        </div>`;
      };
      renderScoringPanel(score, panelEl, () => refreshGng());
      ['f2-source','f2-typo','f2-value'].forEach(id => {
        document.getElementById(id)?.addEventListener('change', () => refreshGng());
      });
      refreshGng();
    }

    async function createClientInline() {
      const name = document.getElementById('f2-nc-name')?.value?.trim();
      if (!name) { showToast('error','Introdu un nume de client'); return; }
      const type = document.getElementById('f2-nc-type')?.value||'company';
      const now = new Date().toISOString();
      const client = { id:uuid(), name, type, contactPerson:'', email:'', phone:'', address:'',
        fiscalCode:'', totalContractsValue:0, totalContractsCount:0, ltvFormula:'sum_contracts',
        relationshipRating:3, lastDealDate:null, reengagementAlertDays:365, notes:'', tags:[], createdAt:now, updatedAt:now };
      await AppState.db.put('clients', client);
      const sel = document.getElementById('f2-client');
      const opt = new Option(name, client.id, true, true);
      sel.appendChild(opt);
      document.getElementById('f2-nc').hidden = true;
      showToast('success',`Client "${name}" creat.`);
    }

    // ── Save lead ─────────────────────────────────────────────────────
    async function saveLead(leadId) {
      const clientId    = document.getElementById('f2-client')?.value;
      const projectName = document.getElementById('f2-name')?.value?.trim();
      if (!clientId || !projectName) { showToast('error','Client și nume proiect sunt obligatorii'); return; }
      const existing = leadId ? await AppState.db.get('leads', leadId) : null;
      const score = {};
      SCORING_CRITERIA.forEach(c => {
        const el = document.querySelector(`input[data-key="${c.key}"]`);
        score[c.key] = el ? Number(el.value) : 5;
      });
      const scoreTotal    = computeScoreTotal(score);
      const scoreCategory = getScoreCategory(scoreTotal);
      const [settings, allLeads] = await Promise.all([AppState.db.get('settings','settings'), AppState.db.getAll('leads')]);
      const hist = allLeads.filter(l=>['won','lost'].includes(l.status));
      const sourceType    = document.getElementById('f2-source')?.value||'other';
      const typology      = document.getElementById('f2-typo')?.value;
      const estimatedValue = Number(document.getElementById('f2-value')?.value)||0;
      const tmp = { scoreTotal, sourceType, typology, estimatedValue };
      const winProbability = computeWinProbability(tmp, settings, hist, null);
      const gng = await computeGoNoGo(tmp, AppState.db);
      const now = new Date().toISOString();
      const endDateVal = document.getElementById('f2-end-date')?.value;
      await AppState.db.put('leads', {
        id: existing?.id || uuid(),
        clientId, projectName,
        address:      document.getElementById('f2-addr')?.value?.trim()||'',
        area:         parseFloat(document.getElementById('f2-area')?.value)||0,
        typology, funnelType: document.getElementById('f2-funnel')?.value,
        sourceType, sourceDetail: document.getElementById('f2-src-detail')?.value?.trim()||'',
        score, scoreTotal, scoreCategory,
        goNoGo: gng.decision, goNoGoReason: gng.reason, winProbability,
        pipelineStage:    existing?.pipelineStage||'brief_primit',
        estimatedValue,
        estimatedEndDate: endDateVal ? new Date(endDateVal).toISOString() : (existing?.estimatedEndDate||null),
        status:           existing?.status||'active',
        wonContractValue: existing?.wonContractValue||null,
        lostReason:       existing?.lostReason||null,
        lostToCompetitor: existing?.lostToCompetitor||'',
        debrief:          existing?.debrief||{completed:false,whatWorked:'',whatFailed:'',scoringAccurate:true,priceAccurate:true,priceDirection:null,completedAt:null},
        notes: existing?.notes||'',
        createdAt:      existing?.createdAt||now,
        stageEnteredAt: existing?.stageEnteredAt||now,
        updatedAt: now,
      });
      closeModal();
      showToast('success', leadId?'Lead actualizat.':'Lead creat cu succes!');
      renderLeads();
    }

    // ── Delete ────────────────────────────────────────────────────────
    async function deleteLead(id) {
      const ok = await showConfirmDialog({ title:'Șterge lead', confirmText:'Șterge definitiv', dangerKeyword:'ȘTERGE',
        message:'Această acțiune șterge lead-ul, ofertele și activitățile asociate. Scrie <strong>ȘTERGE</strong> pentru confirmare.' });
      if (!ok) return;
      const [allOffers, allActivities] = await Promise.all([AppState.db.getAll('offers'), AppState.db.getAll('activities')]);
      await Promise.all([
        AppState.db.delete('leads', id),
        ...allOffers.filter(o=>o.leadId===id).map(o=>AppState.db.delete('offers',o.id)),
        ...allActivities.filter(a=>a.leadId===id).map(a=>AppState.db.delete('activities',a.id)),
      ]);
      showToast('success','Lead șters.'); renderLeads();
    }

    // ── Mark Won ──────────────────────────────────────────────────────
    async function markLeadWon(leadId) {
      const lead = await AppState.db.get('leads', leadId);
      if (!lead) { showToast('error','Lead nu mai există.'); return; }
      const def  = addDays(new Date(),365).toISOString().slice(0,10);
      showModal(`
        <div class="sf-modal-header"><h2 class="sf-modal-title">✓ Marchează câștigat</h2>
          <button class="sf-btn sf-btn--secondary" onclick="closeModal()">✕</button></div>
        <label class="sf-label">Valoare contract (EUR)</label>
        <input class="sf-input" id="won-value" type="number" value="${lead.estimatedValue||''}" style="margin-bottom:10px">
        <label class="sf-label">Data estimată finalizare *</label>
        <input class="sf-input" id="won-end" type="date" value="${def}" style="margin-bottom:14px">
        <div style="display:flex;gap:8px">
          <button class="sf-btn sf-btn--primary" onclick="_confirmWon('${leadId}')">Confirmă</button>
          <button class="sf-btn sf-btn--secondary" onclick="closeModal()">Anulează</button>
        </div>`);
    }
    async function _confirmWon(leadId) {
      const lead = await AppState.db.get('leads', leadId);
      if (!lead) { closeModal(); showToast('error','Lead nu mai există.'); return; }
      const wonVal  = parseFloat(document.getElementById('won-value')?.value)||0;
      const endDate = document.getElementById('won-end')?.value;
      if (!endDate) { showToast('error','Data finalizare este obligatorie'); return; }
      const now = new Date().toISOString();
      await AppState.db.put('leads', {...lead, status:'won', wonContractValue:wonVal,
        estimatedEndDate:new Date(endDate).toISOString(), pipelineStage:'contractat', stageEnteredAt:now, updatedAt:now});
      const cl = await AppState.db.get('clients', lead.clientId);
      if (cl) await AppState.db.put('clients', {...cl, totalContractsValue:(cl.totalContractsValue||0)+wonVal,
        totalContractsCount:(cl.totalContractsCount||0)+1, lastDealDate:now, updatedAt:now});
      closeModal(); showToast('success','Lead marcat câștigat!'); renderLeads();
      typeof _renderPipelineContent === 'function' && _renderPipelineContent();
    }

    // ── Mark Lost ─────────────────────────────────────────────────────
    async function markLeadLost(leadId) {
      showModal(`
        <div class="sf-modal-header"><h2 class="sf-modal-title">✕ Marchează pierdut</h2>
          <button class="sf-btn sf-btn--secondary" onclick="closeModal()">✕</button></div>
        <label class="sf-label">Motiv *</label>
        <select class="sf-select" id="lost-reason" style="margin-bottom:8px"
          onchange="document.getElementById('lost-comp-wrap').hidden=this.value!=='competitor'">
          <option value="price">Preț</option><option value="timing">Timing</option>
          <option value="competitor">Competitor</option><option value="scope">Scop</option>
          <option value="other">Altul</option>
        </select>
        <div id="lost-comp-wrap" hidden style="margin-bottom:10px">
          <input class="sf-input" id="lost-competitor" placeholder="Firma concurentă (opțional)">
        </div>
        <div style="display:flex;gap:8px">
          <button class="sf-btn sf-btn--primary" onclick="_confirmLost('${leadId}')">Confirmă</button>
          <button class="sf-btn sf-btn--secondary" onclick="closeModal()">Anulează</button>
        </div>`);
    }
    async function _confirmLost(leadId) {
      const lead = await AppState.db.get('leads', leadId);
      if (!lead) { closeModal(); showToast('error','Lead nu mai există.'); return; }
      const reason     = document.getElementById('lost-reason')?.value;
      const competitor = document.getElementById('lost-competitor')?.value?.trim()||'';
      const now = new Date().toISOString();
      await AppState.db.put('leads', {...lead, status:'lost', lostReason:reason, lostToCompetitor:competitor, pipelineStage:'pierdut', stageEnteredAt:now, updatedAt:now});
      closeModal(); showToast('info','Lead marcat pierdut. Completează debrieful în Intelligence.'); renderLeads();
      typeof _renderPipelineContent === 'function' && _renderPipelineContent();
    }
  </script>
  <script id="sf-f3">
    // ── Stage definitions ────────────────────────────────────────
    const DISCOVERY_STAGES = [
      { key:'brief_primit',   label:'Brief primit',  terminal:false },
      { key:'scoring',        label:'Scoring',        terminal:false },
      { key:'oferta_trimisa', label:'Ofertă trimisă', terminal:false },
      { key:'negociere',      label:'Negociere',       terminal:false },
      { key:'contractat',     label:'Contractat',      terminal:true  },
    ];
    const DESIGN_STAGES = [
      { key:'brief_primit',   label:'Brief primit',  terminal:false },
      { key:'calculator',     label:'Calculator',     terminal:false },
      { key:'oferta_trimisa', label:'Ofertă trimisă', terminal:false },
      { key:'negociere',      label:'Negociere',       terminal:false },
      { key:'prezentare',     label:'Prezentare',      terminal:false },
      { key:'contractat',     label:'Contractat',      terminal:true  },
    ];
    const TERMINAL_STAGE_KEYS = ['contractat','pierdut','retras'];

    // ── Entry point ───────────────────────────────────────────────
    async function renderPipeline() {
      const page = document.getElementById('page-pipeline');
      if (!page) return;
      if (!page.querySelector('#f3-board')) {
        page.innerHTML = `
          <div class="sf-page-header" style="margin-bottom:12px">
            <div><div class="sf-page-title">Pipeline</div></div>
          </div>
          <div id="f3-filter-bar" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center"></div>
          <div id="f3-stats" style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap"></div>
          <div style="display:flex;gap:6px;margin-bottom:12px">
            <button class="sf-btn" id="f3-tab-disc" onclick="f3SetFunnel('discovery')">Discovery</button>
            <button class="sf-btn" id="f3-tab-des"  onclick="f3SetFunnel('design')">Design</button>
          </div>
          <div id="f3-board"></div>`;
        AppState._f3Funnel = localStorage.getItem('sf_f3_funnel') || 'discovery';
        AppState._f3FiltersReady = false;
      }
      await _renderPipelineContent();
    }

    async function f3SetFunnel(funnel) {
      AppState._f3Funnel = funnel;
      localStorage.setItem('sf_f3_funnel', funnel);
      await _renderPipelineContent();
    }

    // ── Main render ───────────────────────────────────────────────
    async function _renderPipelineContent() {
      const board = document.getElementById('f3-board');
      if (!board || !AppState.db) return;
      const [allLeads, clients] = await Promise.all([AppState.db.getAll('leads'), AppState.db.getAll('clients')]);
      const cm     = Object.fromEntries(clients.map(c => [c.id, c]));
      const funnel = AppState._f3Funnel || 'discovery';

      // Tab styles
      document.getElementById('f3-tab-disc')?.classList.toggle('sf-btn--primary',   funnel==='discovery');
      document.getElementById('f3-tab-disc')?.classList.toggle('sf-btn--secondary', funnel!=='discovery');
      document.getElementById('f3-tab-des')?.classList.toggle('sf-btn--primary',    funnel==='design');
      document.getElementById('f3-tab-des')?.classList.toggle('sf-btn--secondary',  funnel!=='design');

      // Filter bar (once)
      const fb = document.getElementById('f3-filter-bar');
      if (fb && !AppState._f3FiltersReady) {
        AppState._f3FiltersReady = true;
        const srcOpts = [...new Set(allLeads.map(l=>l.sourceType).filter(Boolean))]
          .map(s=>`<option value="${s}">${SOURCE_LABELS[s]||s}</option>`).join('');
        fb.innerHTML = `
          <select class="sf-select" id="f3-f-score"  onchange="_renderPipelineContent()" style="width:130px">
            <option value="">Toate scorurile</option>
            <option value="hot">HOT</option><option value="warm">WARM</option><option value="cold">COLD</option>
          </select>
          <select class="sf-select" id="f3-f-period" onchange="_renderPipelineContent()" style="width:150px">
            <option value="">Toate perioadele</option>
            <option value="month">Luna aceasta</option><option value="90d">Ultimele 90 zile</option>
          </select>
          <select class="sf-select" id="f3-f-source" onchange="_renderPipelineContent()" style="width:160px">
            <option value="">Toate sursele</option>${srcOpts}
          </select>
          <select class="sf-select" id="f3-f-sort"   onchange="_renderPipelineContent()" style="width:170px">
            <option value="default">Sort: Activitate rec.</option>
            <option value="value">Sort: Valoare ↓</option>
            <option value="score">Sort: Scor ↓</option>
            <option value="age">Sort: Vechime stagiu ↓</option>
          </select>`;
      }

      // Read filters
      const fScore  = document.getElementById('f3-f-score')?.value  || '';
      const fPeriod = document.getElementById('f3-f-period')?.value || '';
      const fSource = document.getElementById('f3-f-source')?.value || '';
      const fSort   = document.getElementById('f3-f-sort')?.value   || 'default';

      // Filter leads
      let leads = allLeads.filter(l => l.funnelType===funnel && (l.status==='active'||l.status==='won'));
      if (fScore)             leads = leads.filter(l => getScoreCategory(l.scoreTotal||0) === fScore);
      if (fPeriod==='month')  leads = leads.filter(l => l.createdAt >= (() => { const d=new Date(); d.setDate(1); d.setHours(0,0,0,0); return d.toISOString(); })());
      if (fPeriod==='90d')    leads = leads.filter(l => l.createdAt >= addDays(new Date(),-90).toISOString());
      if (fSource)            leads = leads.filter(l => l.sourceType === fSource);
      if (fSort==='value')    leads.sort((a,b) => (b.estimatedValue||0)-(a.estimatedValue||0));
      else if (fSort==='score') leads.sort((a,b) => (b.scoreTotal||0)-(a.scoreTotal||0));
      else if (fSort==='age')   leads.sort((a,b) => (a.stageEnteredAt||a.createdAt).localeCompare(b.stageEnteredAt||b.createdAt));
      else                    leads.sort((a,b) => (b.updatedAt||b.createdAt).localeCompare(a.updatedAt||a.createdAt));

      // Stats — pipeTotal uses all active leads in funnel (not filtered), other KPIs are global
      const activePipe  = allLeads.filter(l => l.funnelType===funnel && l.status==='active');
      const allWon      = allLeads.filter(l => l.status==='won');
      const allLost     = allLeads.filter(l => l.status==='lost');
      const pipeTotal   = activePipe.reduce((s,l) => s+(l.estimatedValue||0), 0);
      const totalClosed = allWon.length + allLost.length;
      const winRate     = totalClosed>0 ? Math.round(allWon.length/totalClosed*100) : 0;
      const todayISO    = new Date().toISOString();
      const activeProjs = allWon.filter(l => l.estimatedEndDate && l.estimatedEndDate>todayISO).length;
      const withTime    = allLeads.filter(l => ['won','lost'].includes(l.status) && l.createdAt && l.updatedAt);
      const avgClose    = withTime.length>0 ? Math.round(withTime.reduce((s,l)=>s+daysDiff(l.createdAt,l.updatedAt),0)/withTime.length) : 0;

      document.getElementById('f3-stats').innerHTML = `
        <div class="sf-kpi-card" style="flex:1;min-width:130px"><div class="sf-kpi-value">${pipeTotal.toLocaleString('ro-RO')} €</div><div class="sf-kpi-label">Total pipeline</div></div>
        <div class="sf-kpi-card" style="flex:1;min-width:130px"><div class="sf-kpi-value">${winRate}%</div><div class="sf-kpi-label">Win rate</div></div>
        <div class="sf-kpi-card" style="flex:1;min-width:130px"><div class="sf-kpi-value">${activeProjs}</div><div class="sf-kpi-label">Proiecte active</div></div>
        <div class="sf-kpi-card" style="flex:1;min-width:130px"><div class="sf-kpi-value">${avgClose>0?avgClose+'z':'—'}</div><div class="sf-kpi-label">Avg. close</div></div>`;

      // Kanban board
      const stages  = funnel==='discovery' ? DISCOVERY_STAGES : DESIGN_STAGES;
      const avgDays = await calcAvgDaysPerStage(AppState.db, funnel);
      board.innerHTML = `<div class="sf-kanban">${stages.map(s => {
        const colLeads = leads.filter(l =>
          l.pipelineStage===s.key && (s.terminal ? l.status==='won' : l.status==='active'));
        const colVal = colLeads.reduce((acc,l) =>
          acc + (s.terminal ? (l.wonContractValue||l.estimatedValue||0) : (l.estimatedValue||0)), 0);
        return `<div class="sf-kanban-col" data-stage="${s.key}">
          <div class="sf-kanban-col__header">
            <span>${s.label}</span>
            <span class="sf-kanban-col__count">${colLeads.length}</span>
          </div>
          <div class="sf-kanban-col__total">${colVal>0?colVal.toLocaleString('ro-RO')+' €':'—'}</div>
          <div class="sf-kanban-cards">${
            colLeads.map(l => renderKanbanCard(l, cm[l.clientId], avgDays[s.key], stages)).join('')
          }</div>
        </div>`;
      }).join('')}</div>`;
    }

    // ── Stage age ─────────────────────────────────────────────────
    function getStageAgeClass(daysInStage, avgDays) {
      if (!avgDays || avgDays < 1) return null;
      if (daysInStage < avgDays * 0.75) return 'good';
      if (daysInStage < avgDays * 1.25) return 'normal';
      return 'late';
    }

    async function calcAvgDaysPerStage(db, funnelType) {
      const all    = await db.getAll('leads');
      const stages = funnelType==='discovery' ? DISCOVERY_STAGES : DESIGN_STAGES;
      const def    = {}; stages.forEach(s => { def[s.key] = 7; });
      const closed = all.filter(l => l.funnelType===funnelType && ['won','lost'].includes(l.status) && l.createdAt && l.updatedAt);
      if (closed.length < 3) return def;
      const avgTotal    = closed.reduce((s,l) => s+daysDiff(l.createdAt,l.updatedAt), 0) / closed.length;
      const nActive     = stages.filter(s => !s.terminal).length;
      const perStage    = Math.max(3, Math.round(avgTotal / nActive));
      const result      = {}; stages.forEach(s => { result[s.key] = s.terminal ? null : perStage; });
      return result;
    }

    // ── Card ──────────────────────────────────────────────────────
    function renderKanbanCard(lead, client, avgDays, stages) {
      const cat         = getScoreCategory(lead.scoreTotal||0);
      const daysInStage = daysDiff(lead.stageEnteredAt||lead.createdAt, new Date().toISOString());
      const ageClass    = getStageAgeClass(daysInStage, avgDays);
      const ageHTML     = `<span class="sf-lead-card__age${ageClass?' age--'+ageClass:''}">⏱ ${daysInStage}z în stagiu</span>`;
      const moveOpts    = [
        ...stages.filter(s => s.key!==lead.pipelineStage).map(s => `<option value="${s.key}">${s.label}</option>`),
        `<option value="pierdut">✕ Pierdut</option>`,
        `<option value="retras">○ Retras</option>`,
      ].join('');
      const dispVal = lead.status==='won'
        ? (lead.wonContractValue||lead.estimatedValue||0)
        : (lead.estimatedValue||0);
      return `<div class="sf-lead-card sf-lead-card--${cat}" data-lead-id="${lead.id}">
        <div class="sf-lead-card__title">${client?.name||'—'}</div>
        <div class="sf-lead-card__sub">${lead.projectName||'—'}</div>
        <div class="sf-lead-card__meta">
          <span style="font-size:11px">${lead.area||'?'} mp · ${lead.typology||'—'}</span>
          ${dispVal>0?`<span style="font-size:11px;font-weight:600">${dispVal.toLocaleString('ro-RO')} €</span>`:''}
          <span class="sf-badge sf-badge--${cat}" style="font-size:10px">${cat.toUpperCase()}</span>
        </div>
        <div class="sf-lead-card__meta">
          <span style="font-size:11px">Win: <strong>${lead.winProbability!=null?lead.winProbability+'%':'—'}</strong></span>
          ${lead.sourceType?`<span style="font-size:11px;color:var(--sf-text-3)">${SOURCE_LABELS[lead.sourceType]||lead.sourceType}</span>`:''}
        </div>
        <div style="margin:4px 0 0">${ageHTML}</div>
        <div class="sf-lead-card__actions">
          <button class="sf-btn sf-btn--secondary" onclick="openEditLeadModal('${lead.id}')">Edit</button>
          ${lead.status==='active'?`<select class="sf-select" style="font-size:11px;padding:3px 6px;flex:1"
            onchange="f3MoveFromSelect(this,'${lead.id}')">
            <option value="">Mută ▸</option>${moveOpts}
          </select>`:'<span style="font-size:11px;color:var(--sf-hot);font-weight:600;margin-left:4px">✓ Câștigat</span>'}
        </div>
      </div>`;
    }

    // ── Move & terminal ───────────────────────────────────────────
    async function moveLead(leadId, newStage) {
      const lead = await AppState.db.get('leads', leadId);
      if (!lead) return;
      const now = new Date().toISOString();
      await AppState.db.put('leads', {...lead, pipelineStage:newStage, stageEnteredAt:now, updatedAt:now});
    }

    async function f3MoveFromSelect(select, leadId) {
      const toStage = select.value;
      if (!toStage) return;
      select.value = '';
      if (TERMINAL_STAGE_KEYS.includes(toStage)) {
        await handleTerminalStageDrop(leadId, toStage);
      } else {
        await moveLead(leadId, toStage);
        const label = [...DISCOVERY_STAGES,...DESIGN_STAGES].find(s=>s.key===toStage)?.label||toStage;
        showToast('success',`Lead mutat în "${label}"`);
        await _renderPipelineContent();
      }
    }

    async function handleTerminalStageDrop(leadId, toStage) {
      if (toStage==='contractat') {
        await markLeadWon(leadId);
      } else if (toStage==='pierdut') {
        await markLeadLost(leadId);
      } else if (toStage==='retras') {
        const ok = await showConfirmDialog({ title:'Retrage lead', confirmText:'Retrage',
          message:'Lead-ul va fi marcat retras și nu va mai apărea în pipeline activ.' });
        if (!ok) return;
        const lead = await AppState.db.get('leads', leadId);
        if (!lead) return;
        const now  = new Date().toISOString();
        await AppState.db.put('leads', {...lead, status:'withdrawn', pipelineStage:'retras', stageEnteredAt:now, updatedAt:now});
        showToast('info','Lead retras.');
        await _renderPipelineContent();
        typeof renderLeads === 'function' && renderLeads();
      }
    }
  </script>
  <script id="sf-f3-dnd">   /* M10 — DnD */       </script>
  <script id="sf-f1">
    let _f1RC  = null; // RateCard cache
    let _f1Tab = 'arch';

    async function renderCalculator() {
      const page = document.getElementById('page-calculator');
      if (!page) return;
      if (!page.querySelector('#f1-content')) {
        page.innerHTML = `
          <div class="sf-page-header" style="margin-bottom:12px">
            <div class="sf-page-title">Calculator</div>
          </div>
          <div style="display:flex;gap:6px;margin-bottom:16px">
            <button class="sf-btn" id="f1-tab-arch" onclick="f1SetTab('arch')">ARH — Arhitectură</button>
            <button class="sf-btn" id="f1-tab-int"  onclick="f1SetTab('int')">INT — Interior</button>
          </div>
          <div id="f1-content"></div>`;
      }
      await _f1LoadRC();
      await _renderCalcContent();
    }

    async function f1SetTab(tab) {
      _f1Tab = tab;
      await _renderCalcContent();
    }

    async function _f1LoadRC() {
      if (_f1RC) return;
      const all = await AppState.db.getAll('rateCards');
      _f1RC = all.find(r => r.isDefault) || all[0] || null;
    }

    async function _renderCalcContent() {
      const content = document.getElementById('f1-content');
      if (!content || !AppState.db) return;
      const isArch = _f1Tab === 'arch';
      document.getElementById('f1-tab-arch')?.classList.toggle('sf-btn--primary',   isArch);
      document.getElementById('f1-tab-arch')?.classList.toggle('sf-btn--secondary', !isArch);
      document.getElementById('f1-tab-int')?.classList.toggle('sf-btn--primary',    !isArch);
      document.getElementById('f1-tab-int')?.classList.toggle('sf-btn--secondary',  isArch);

      if (!_f1RC) {
        content.innerHTML = `<div class="sf-empty-state">Niciun Rate Card configurat. Completați Setup-ul mai întâi.</div>`;
        return;
      }
      const R = _f1RC.rates;
      const typoMap  = isArch ? R.arch : R.int;
      const phases   = isArch ? R.archPhases : R.intPhases;
      const conds    = isArch ? R.archSpecialConditions : R.intSpecialConditions;
      const typoLbls = {
        arch: { T1:'T1 — Locuință individuală', T2:'T2 — Bloc locuințe', T3:'T3 — Comercial/Industrial',
                T4:'T4 — City Scale', T5:'T5 — Logistic/Turism', T6:'T6 — Infrastructură' },
        int:  { T1:'T1 — Office/Gym', T2:'T2 — Rezidențial/Hotel Room', T3:'T3 — Retail/Coffee',
                T4:'T4 — Hotel Lobby', T5:'T5 — Medical/Restaurant', T6:'T6 — Wellness/SPA' }
      }[_f1Tab];

      const phaseChecks = phases.map(p => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <input type="checkbox" id="f1-ph-${p.id}" checked onchange="f1UpdateResult()"
            style="width:16px;height:16px;flex-shrink:0">
          <label for="f1-ph-${p.id}" style="flex:1;font-size:13px">${p.name}</label>
          <span id="f1-ph-h-${p.id}" style="font-size:12px;color:var(--sf-text-2);min-width:44px;text-align:right">—h</span>
        </div>`).join('');

      const condChecks = conds.map(c => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <input type="checkbox" id="f1-cd-${c.id}" data-delta="${c.delta}" onchange="f1UpdateResult()"
            style="width:16px;height:16px;flex-shrink:0">
          <label for="f1-cd-${c.id}" style="flex:1;font-size:12px">${c.name}</label>
          <span style="font-size:11px;color:var(--sf-warm);white-space:nowrap">+${Math.round(c.delta*100)}%</span>
        </div>`).join('');

      const typoOpts = Object.keys(typoMap).map(k =>
        `<option value="${k}">${typoLbls[k]||k} (k=${typoMap[k].kDefault})</option>`).join('');

      content.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start">
          <div>
            <div class="sf-card" style="margin-bottom:12px">
              <label class="sf-label">Tipologie</label>
              <select class="sf-select" id="f1-typo" onchange="f1UpdateResult()" style="width:100%;margin-bottom:10px">${typoOpts}</select>
              <div id="f1-typo-info" style="font-size:11px;color:var(--sf-text-2);margin-bottom:10px"></div>
              <div style="display:flex;gap:12px">
                <div style="flex:1">
                  <label class="sf-label">Suprafață (mp)</label>
                  <input class="sf-input" type="number" id="f1-area" min="1" max="200000"
                    value="200" oninput="f1UpdateResult()" style="width:100%">
                </div>
                <div style="flex:1">
                  <label class="sf-label">Unități repetitive</label>
                  <input class="sf-input" type="number" id="f1-rep" min="1" max="500"
                    value="1" oninput="f1UpdateResult()" style="width:100%">
                  <div style="font-size:10px;color:var(--sf-text-3);margin-top:2px">⚠ Estimat — verificați față de Excel</div>
                </div>
              </div>
              <div id="f1-gamma-info" style="font-size:12px;color:var(--sf-primary);margin-top:8px;font-weight:600"></div>
            </div>
            <div class="sf-card" style="margin-bottom:12px">
              <div style="font-size:13px;font-weight:600;margin-bottom:10px">Faze incluse</div>
              ${phaseChecks}
            </div>
            <div class="sf-card">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                <span style="font-size:13px;font-weight:600">Condiții speciale</span>
                <span id="f1-delta-total" style="font-size:12px;color:var(--sf-warm);font-weight:400"></span>
              </div>
              ${!isArch ? '<div style="font-size:11px;color:var(--sf-warm);margin-bottom:8px">⚠ Estimate — verificați față de Calculator Excel HERTZ</div>' : ''}
              ${condChecks}
            </div>
          </div>
          <div>
            <div class="sf-card" style="background:var(--sf-surface-2)">
              <div style="font-size:12px;font-weight:700;letter-spacing:0.05em;color:var(--sf-text-2);margin-bottom:12px">ESTIMARE PREȚ</div>
              <div id="f1-result-content" style="min-height:120px"></div>
              <div style="display:flex;gap:8px;margin-top:12px">
                <button class="sf-btn sf-btn--secondary" onclick="f1CopyToClipboard()" style="flex:1">Copiază</button>
                <button class="sf-btn sf-btn--primary"   onclick="f1SaveAsOffer()"     style="flex:1">Salvează ca ofertă</button>
              </div>
            </div>
            <div id="f1-price-intel" style="margin-top:12px"></div>
          </div>
        </div>`;
      f1UpdateResult();
    }

    // ── Math ─────────────────────────────────────────────────────────
    function calcGamma(area, gammaTable) {
      for (const g of gammaTable) {
        if (g.maxArea === null || area <= g.maxArea) return g.gamma;
      }
      return 1.0;
    }

    function f1UpdateResult() {
      if (!_f1RC) return;
      const R      = _f1RC.rates;
      const isArch = _f1Tab === 'arch';
      const typo   = document.getElementById('f1-typo')?.value || 'T1';
      const area   = parseFloat(document.getElementById('f1-area')?.value) || 0;
      const rep    = parseInt(document.getElementById('f1-rep')?.value)   || 1;

      const typoConf   = (isArch ? R.arch : R.int)[typo] || { kDefault:1, refArea:100 };
      const phases     = isArch ? R.archPhases : R.intPhases;
      const conds      = isArch ? R.archSpecialConditions : R.intSpecialConditions;
      const gammaTable = isArch ? R.archGamma : R.intGamma;

      // Typo info
      const infoEl = document.getElementById('f1-typo-info');
      if (infoEl) infoEl.textContent = `kDefault: ${typoConf.kDefault} | Referință: ${typoConf.refArea} mp`;

      // Gamma
      const gamma = area > 0 ? calcGamma(area, gammaTable) : 1.0;
      const gammaEl = document.getElementById('f1-gamma-info');
      if (gammaEl) gammaEl.textContent = area > 0 ? `Coeficient suprafață (γ): ${gamma.toFixed(2)}` : '';

      // Per-phase hours + sum
      let hSum = 0;
      phases.forEach(p => {
        const checked = document.getElementById(`f1-ph-${p.id}`)?.checked;
        const hPhase  = area > 0
          ? Math.round(p.baseHours * typoConf.kDefault * Math.pow(area / typoConf.refArea, p.alpha))
          : 0;
        const el = document.getElementById(`f1-ph-h-${p.id}`);
        if (el) el.textContent = `${hPhase}h`;
        if (checked) hSum += hPhase;
      });

      // Special conditions
      let deltaSum = 0;
      conds.forEach(c => {
        if (document.getElementById(`f1-cd-${c.id}`)?.checked) deltaSum += c.delta;
      });
      const deltaEl = document.getElementById('f1-delta-total');
      if (deltaEl) deltaEl.textContent = deltaSum > 0 ? `Condiții speciale: +${Math.round(deltaSum*100)}%` : '';

      // Rep units discount (empiric: −4%/unitate, min 70%)
      const repDisc = rep >= 2 ? Math.max(0.70, 1 - (rep - 1) * 0.04) : 1;
      const hTotal  = Math.round(hSum * (1 + deltaSum) * gamma * repDisc);

      const rate  = _f1RC.hourlyRateEUR || 65;
      const std   = Math.round(hTotal * rate);
      const min   = Math.round(std * 0.90);
      const max   = Math.round(std * 1.15);

      const resEl = document.getElementById('f1-result-content');
      if (!resEl) return;
      if (area <= 0 || hTotal === 0) {
        resEl.innerHTML = `<div style="color:var(--sf-text-2);font-size:13px">Introduceți suprafața și selectați cel puțin o fază.</div>`;
        const piEl = document.getElementById('f1-price-intel');
        if (piEl) piEl.innerHTML = '';
        return;
      }
      resEl.innerHTML = `
        <div style="margin-bottom:12px">
          <div style="font-size:13px;color:var(--sf-text-2)">Ore totale: <strong style="color:var(--sf-text);font-size:15px">${hTotal}h</strong></div>
          ${rep >= 2 ? `<div style="font-size:11px;color:var(--sf-warm);margin-top:2px">Discount repetitive (${rep} unități): −${Math.round((1-repDisc)*100)}%</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;background:var(--sf-surface)">
            <span style="font-size:12px;color:var(--sf-text-2)">Minim (×0.90)</span>
            <span style="font-size:16px;font-weight:600;font-family:var(--sf-font-num)">${min.toLocaleString('ro-RO')} EUR</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:6px;background:var(--sf-primary);color:#fff">
            <span style="font-size:12px;opacity:0.85">Standard ★</span>
            <span style="font-size:18px;font-weight:700;font-family:var(--sf-font-num)">${std.toLocaleString('ro-RO')} EUR</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;background:var(--sf-surface)">
            <span style="font-size:12px;color:var(--sf-text-2)">Premium (×1.15)</span>
            <span style="font-size:16px;font-weight:600;font-family:var(--sf-font-num);color:var(--sf-accent)">${max.toLocaleString('ro-RO')} EUR</span>
          </div>
        </div>`;
      // Price Intelligence (async, fire-and-forget)
      _f1LoadPI(typo, isArch ? 'discovery' : 'design', area, std);
    }

    async function _f1LoadPI(typology, funnelType, area, currentPrice) {
      const c = document.getElementById('f1-price-intel');
      if (!c) return;
      const pi = await f1QueryPI(typology, funnelType, area);
      f1RenderPI(c, pi, currentPrice);
    }

    // ── Price Intelligence ────────────────────────────────────────────
    async function f1QueryPI(typology, funnelType, area) {
      const [allLeads, settings] = await Promise.all([
        AppState.db.getAll('leads'),
        AppState.db.get('settings', 'settings')
      ]);
      const minN = settings?.priceIntelMinSamples || 30;
      const prices = allLeads
        .filter(l => l.status === 'won' && l.typology === typology
                  && l.funnelType === funnelType
                  && (l.wonContractValue || 0) > 0
                  && (l.area || 0) >= area * 0.50 && (l.area || 0) <= area * 1.50)
        .map(l => l.wonContractValue)
        .sort((a, b) => a - b);
      if (!prices.length) return null;
      return {
        samples: prices.length, minN, typology,
        hr: { min: prices[0], max: prices[prices.length - 1], median: prices[Math.floor(prices.length / 2)] },
        ok: prices.length >= minN
      };
    }

    function getPricePosition(currentPriceEUR, pi) {
      if (!pi || !pi.ok) return null;
      const dev = (currentPriceEUR - pi.hr.median) / pi.hr.median;
      if (dev < -0.10) return -1;
      if (dev >  0.10) return +1;
      return 0;
    }

    function f1RenderPI(container, pi, currentPrice) {
      if (!pi) { container.innerHTML = ''; return; }
      const pos    = getPricePosition(currentPrice, pi);
      const pct    = pi.hr.median > 0 ? Math.round((currentPrice - pi.hr.median) / pi.hr.median * 100) : 0;
      const posLbl = pos === null ? '' : pos === 0 ? '≈ median' : (pct > 0 ? `+${pct}%` : `${pct}%`) + ' față de median';
      const color  = pos === null ? '' : pos === 0 ? 'var(--sf-primary)' : pos > 0 ? 'var(--sf-warm)' : 'var(--sf-hot)';
      container.innerHTML = `
        <div class="sf-card" style="border-left:3px solid ${pi.ok?'var(--sf-primary)':'var(--sf-warm)'}">
          <div style="font-size:11px;font-weight:700;letter-spacing:0.05em;color:var(--sf-text-2);margin-bottom:8px">CONTEXT PIAȚĂ (${pi.typology})</div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="color:var(--sf-text-2)">Range câștigat</span>
            <span><strong>${pi.hr.min.toLocaleString('ro-RO')}€</strong> – <strong>${pi.hr.max.toLocaleString('ro-RO')}€</strong></span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="color:var(--sf-text-2)">Median</span>
            <span><strong>${pi.hr.median.toLocaleString('ro-RO')}€</strong></span>
          </div>
          ${currentPrice > 0 ? `
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px">
            <span style="color:var(--sf-text-2)">Prețul tău</span>
            <span style="color:${color};font-weight:600">${currentPrice.toLocaleString('ro-RO')}€ ${posLbl}</span>
          </div>` : ''}
          ${!pi.ok
            ? `<div style="font-size:11px;color:var(--sf-warm);padding:6px 8px;background:var(--sf-warm-bg);border-radius:4px">⚠ DATE INSUFICIENTE (n=${pi.samples}, minim ${pi.minN} necesar)<br>Afișat informativ — fără recomandare automată</div>`
            : `<div style="font-size:11px;color:var(--sf-primary)">n=${pi.samples} deals — Price Intelligence ACTIV</div>`}
        </div>`;
    }

    function f1CopyToClipboard() {
      const el = document.getElementById('f1-result-content');
      if (!el || !el.textContent.includes('EUR')) return;
      navigator.clipboard?.writeText(el.innerText || el.textContent)
        .then(() => showToast('success','Copiat în clipboard.'))
        .catch(() => showToast('error','Clipboard indisponibil.'));
    }
    function f1SaveAsOffer() {
      showToast('info','Generatorul de oferte va fi disponibil în M12.');
    }
  </script>
  <script id="sf-f4">
    // ══════════════════════════════════════════════════════
    //  sf-f4 — Activity CRUD + Cadence (M8)
    //  PRD StudioFlow v6.0 § F4
    // ══════════════════════════════════════════════════════

    const CADENCE_TEMPLATES = {
      0:  'Confirmare primire ofertă',
      3:  'Verificare întrebări după studiu ofertă',
      7:  'Status urmărire — decizie preliminară?',
      14: 'Timeline decizie finale',
      30: 'Check final — arhivare sau re-deschidere'
    };

    const ACT_LABELS = {
      call:'Apel', email:'Email', meeting:'Întâlnire',
      offer_sent:'Ofertă trimisă', follow_up:'Follow-up', note:'Notă'
    };
    const ACT_ICONS = {
      call:'📞', email:'✉️', meeting:'🤝',
      offer_sent:'📄', follow_up:'🔔', note:'📝'
    };

    // ── Open activities modal for a lead ──────────────────
    async function openLeadActivities(leadId) {
      const [lead, clients] = await Promise.all([
        AppState.db.get('leads', leadId),
        AppState.db.getAll('clients')
      ]);
      if (!lead) return;
      const client = clients.find(c => c.id === lead.clientId);
      const today  = new Date().toISOString().slice(0,10);
      const typeOpts = Object.entries(ACT_LABELS)
        .map(([v,l])=>`<option value="${v}">${l}</option>`).join('');

      showModal(`
        <div class="sf-modal-header">
          <h2 class="sf-modal-title">Activități — ${client?.name||'—'} / ${lead.projectName||'—'}</h2>
          <button class="sf-btn sf-btn--secondary" onclick="closeModal()">✕</button>
        </div>
        <div style="background:var(--sf-surface-2);border-radius:var(--sf-r);padding:12px;margin-bottom:16px">
          <div style="font-size:11px;font-weight:600;color:var(--sf-text-2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Loghează activitate</div>
          <div style="display:grid;grid-template-columns:130px 1fr 1fr 120px auto;gap:8px;align-items:end">
            <div>
              <label class="sf-label" style="font-size:11px">Tip</label>
              <select class="sf-select" id="f4-qt" style="height:32px;font-size:12px">${typeOpts}</select>
            </div>
            <div>
              <label class="sf-label" style="font-size:11px">Descriere</label>
              <input class="sf-input" id="f4-qd" placeholder="Scurtă descriere" style="height:32px;font-size:12px">
            </div>
            <div>
              <label class="sf-label" style="font-size:11px">Outcome</label>
              <input class="sf-input" id="f4-qo" placeholder="Rezultat (opțional)" style="height:32px;font-size:12px">
            </div>
            <div>
              <label class="sf-label" style="font-size:11px">Data</label>
              <input class="sf-input" type="date" id="f4-qdate" value="${today}" style="height:32px;font-size:12px">
            </div>
            <button class="sf-btn sf-btn--primary" onclick="f4QuickSave('${leadId}')" style="height:32px;font-size:12px;padding:0 12px">+ Log</button>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:12px;font-weight:600;color:var(--sf-text-2)">Timeline</span>
          <button class="sf-btn sf-btn--secondary" onclick="f4GenerateCadenceManual('${leadId}')" style="font-size:11px;padding:3px 10px">⚡ Generează cadence</button>
        </div>
        <div id="f4-timeline" class="f4-timeline"></div>
      `, { wide: true });

      await f4RefreshTimeline(leadId);
    }

    // ── Render timeline inside modal ──────────────────────
    async function f4RefreshTimeline(leadId) {
      const el = document.getElementById('f4-timeline');
      if (!el) return;
      const acts = await AppState.db.getAllByIndex('activities', 'leadId', leadId);
      acts.sort((a,b) => (b.scheduledAt||b.createdAt).localeCompare(a.scheduledAt||a.createdAt));

      if (!acts.length) {
        el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--sf-text-2)">
          Nicio activitate înregistrată.<br>
          <span style="font-size:12px">Loghează prima interacțiune sau generează cadence automat.</span>
        </div>`;
        return;
      }

      const today = new Date().toISOString().slice(0,10);
      el.innerHTML = acts.map(a => {
        const d = a.scheduledAt?.slice(0,10) || '';
        const isOverdue = !a.completedAt && d && d < today;
        return `<div class="f4-activity-item ${a.completedAt?'f4-done':''} ${isOverdue?'f4-overdue':''}">
          <div class="f4-act-icon">${ACT_ICONS[a.type]||'•'}</div>
          <div class="f4-act-body">
            <div class="f4-act-meta">
              <span class="f4-act-type">${ACT_LABELS[a.type]||a.type}</span>
              ${a.isAutoCadence?'<span class="f4-act-badge">AUTO</span>':''}
              ${isOverdue?'<span class="f4-act-badge" style="color:var(--sf-cold)">Întârziat</span>':''}
              <span class="f4-act-date">${d?formatDate(d):'—'}</span>
            </div>
            <div class="f4-act-desc">${a.description||''}</div>
            ${a.outcome?`<div class="f4-act-outcome">↳ ${a.outcome}</div>`:''}
            ${a.completedAt?`<div class="f4-act-done">✓ Finalizat ${formatDate(a.completedAt.slice(0,10))}</div>`:''}
          </div>
          <div class="f4-act-actions">
            ${!a.completedAt?`<button class="sf-btn sf-btn--secondary" title="Marchează complet"
              onclick="f4CompleteAct('${a.id}','${leadId}')" style="font-size:11px;padding:3px 8px">✓</button>`:''}
            <button class="sf-btn sf-btn--secondary" title="Șterge"
              onclick="f4DeleteAct('${a.id}','${leadId}')" style="font-size:11px;padding:3px 8px">🗑</button>
          </div>
        </div>`;
      }).join('');
    }

    // ── Quick log save ────────────────────────────────────
    async function f4QuickSave(leadId) {
      const type    = document.getElementById('f4-qt')?.value;
      const desc    = document.getElementById('f4-qd')?.value?.trim() || '';
      const outcome = document.getElementById('f4-qo')?.value?.trim() || null;
      const dateVal = document.getElementById('f4-qdate')?.value || new Date().toISOString().slice(0,10);
      if (!type) { showToast('error','Selectează tipul activității'); return; }

      const now = new Date().toISOString();
      await AppState.db.put('activities', {
        id: uuid(), leadId, type, description: desc, outcome,
        scheduledAt: dateVal + 'T09:00:00.000Z',
        completedAt: null, isAutoCadence: false, cadenceStep: null, createdAt: now
      });

      const lead = await AppState.db.get('leads', leadId);
      if (lead) await AppState.db.put('leads', { ...lead, updatedAt: now });

      const descEl = document.getElementById('f4-qd');
      const outEl  = document.getElementById('f4-qo');
      if (descEl) descEl.value = '';
      if (outEl)  outEl.value  = '';

      showToast('success', 'Activitate logată');
      await f4RefreshTimeline(leadId);
    }

    // ── Complete activity ─────────────────────────────────
    async function f4CompleteAct(actId, leadId) {
      const a = await AppState.db.get('activities', actId);
      if (!a) return;
      await AppState.db.put('activities', { ...a, completedAt: new Date().toISOString() });
      await f4RefreshTimeline(leadId);
    }

    // ── Delete activity ───────────────────────────────────
    async function f4DeleteAct(actId, leadId) {
      const ok = await showConfirmDialog({
        title:'Șterge activitate', message:'Confirmi ștergerea acestei activități?', confirmText:'Șterge'
      });
      if (!ok) return;
      await AppState.db.delete('activities', actId);
      await f4RefreshTimeline(leadId);
    }

    // ── Auto-cadence generation (wired from M12 la offer sent) ───────
    async function generateCadenceActivities(leadId, offerSentDate) {
      const [settings, existing] = await Promise.all([
        AppState.db.get('settings', 'settings'),
        AppState.db.getAllByIndex('activities', 'leadId', leadId)
      ]);
      const cadenceDays = settings?.cadenceDays || [0, 3, 7, 14, 30];
      const existingSteps = new Set(existing.filter(a => a.isAutoCadence).map(a => a.cadenceStep));
      const sentDate = offerSentDate instanceof Date ? offerSentDate : new Date(offerSentDate);

      const toCreate = cadenceDays
        .filter(day => !existingSteps.has(day))
        .map(day => ({
          id: uuid(), leadId, type: 'follow_up',
          description: CADENCE_TEMPLATES[day] ?? `Follow-up zi ${day}`,
          outcome: null,
          scheduledAt: addDays(sentDate, day).toISOString(),
          completedAt: null, isAutoCadence: true, cadenceStep: day,
          createdAt: new Date().toISOString()
        }));

      if (toCreate.length) await AppState.db.putBulk('activities', toCreate);
      return toCreate.length;
    }

    // ── Manual cadence trigger ────────────────────────────
    async function f4GenerateCadenceManual(leadId) {
      const count = await generateCadenceActivities(leadId, new Date());
      if (count === 0) showToast('info', 'Cadence complet — toate etapele există deja.');
      else { showToast('success', `${count} activități cadence generate`); await f4RefreshTimeline(leadId); }
    }

    // ── Quick log shortcut (L key — wired în sf-shortcuts M17) ───────
    async function openQuickLogModal(leadId) {
      if (leadId) { await openLeadActivities(leadId); return; }
      showToast('info', 'Selectează un lead din pagina Leads pentru a loga activitate.');
    }
  </script>
